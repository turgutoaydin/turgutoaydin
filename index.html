<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kapadokya Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5E3A;
            --secondary: #FFB347;
            --dark: #1A1A2E;
            --light: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--dark);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Oyun Konteyneri - Mobil dikey kısıtlaması */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px; /* Tablet/PC'de ortada mobil görünüm için */
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
            background: #87CEEB; /* Fallback */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* HUD & Arayüz */
        .hud {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .score-board {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: 0 4px 0 rgba(0,0,0,0.2), 0 0 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fuel-wrapper {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 5px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .fuel-icon {
            font-size: 1.5rem;
            margin: 0 8px;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .fuel-bar-bg {
            width: 100px;
            height: 14px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            margin-right: 8px;
            overflow: hidden;
            position: relative;
        }

        .fuel-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #FF3366, #FF9933, #00CC66);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);
        }

        /* Ekranlar (Menü / Game Over) */
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .logo {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: var(--light);
            text-align: center;
            line-height: 1.1;
            margin-bottom: 10px;
            text-shadow: 0 6px 0 var(--primary), 0 10px 20px rgba(0,0,0,0.5);
            transform: rotate(-3deg);
            animation: floatLogo 3s ease-in-out infinite;
        }

        .logo span {
            color: var(--secondary);
            font-size: 2rem;
            display: block;
            transform: rotate(3deg);
        }

        .btn {
            background: linear-gradient(to bottom, #FFB347, #FF5E3A);
            border: none;
            border-radius: 40px;
            padding: 18px 45px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #C94225, 0 15px 20px rgba(0,0,0,0.3);
            transition: all 0.1s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #C94225, 0 5px 10px rgba(0,0,0,0.3);
        }

        .stats-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stats-box h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #ccc;
            text-transform: uppercase;
        }

        .stats-box .score {
            font-family: 'Fredoka One', cursive;
            font-size: 3.5rem;
            color: var(--secondary);
            margin: 5px 0;
            text-shadow: 0 3px 0 rgba(0,0,0,0.5);
        }

        .instruction {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            margin-top: 20px;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(-1deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Titreşim efekti için class */
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div class="score-board">
            🎈 <span id="currentScore">0</span>
        </div>
        <div class="fuel-wrapper">
            <span class="fuel-icon">🔥</span>
            <div class="fuel-bar-bg">
                <div class="fuel-bar-fill" id="fuelFill"></div>
            </div>
        </div>
    </div>

    <div id="menuScreen" class="screen active">
        <div class="logo">
            KAPADOKYA<br><span>ULTIMATE</span>
        </div>
        <button class="btn" id="startBtn">UÇUŞA BAŞLA</button>
        <div class="instruction">Ekrana basılı tutarak yüksel,<br>yakıt topla ve engellerden kaç!</div>
    </div>

    <div id="gameoverScreen" class="screen">
        <div class="logo" style="font-size: 3rem; color: #FF3366;">
            DÜŞTÜN!
        </div>
        <div class="stats-box">
            <h3>Skorun</h3>
            <div class="score" id="finalScore">0</div>
            <h3 style="font-size: 0.9rem;">Zorluk: <span id="finalLevel" style="color:#FFF;">1</span></h3>
        </div>
        <button class="btn" id="restartBtn">TEKRAR DENE</button>
    </div>
</div>

<script>
/**
 * KAPADOKYA ULTIMATE - GAME ENGINE
 * Etourgood/Voodoo tarzı "Juicy" hyper-casual altyapısı.
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

// UI Elementleri
const currentScoreEl = document.getElementById('currentScore');
const fuelFillEl = document.getElementById('fuelFill');
const menuScreen = document.getElementById('menuScreen');
const gameoverScreen = document.getElementById('gameoverScreen');
const finalScoreEl = document.getElementById('finalScore');
const finalLevelEl = document.getElementById('finalLevel');

// Canvas Çözünürlüğü (Retina Desteği)
let width, height;
function resize() {
    width = container.clientWidth;
    height = container.clientHeight;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
}
window.addEventListener('resize', resize);
resize();

// ----- OYUN DURUMU & AYARLAR -----
let state = 'MENU'; // MENU, PLAYING, GAMEOVER
let frames = 0;
let score = 0;
let fuel = 100;
let gameSpeed = 3.5; // Arka plan ve obje kayma hızı
let level = 1;

// ----- FİZİK VE KONTROLLER -----
let isTouching = false;

const balloon = {
    x: width * 0.25,
    y: height / 2,
    radius: 22,
    vy: 0,
    gravity: 0.45,
    lift: -0.9,
    terminalVelocity: 8,
    tilt: 0
};

// ----- NESNE DİZİLERİ -----
let obstacles = [];
let birds = [];
let fuels = [];
let particles = [];
let floatingTexts = [];
let bgHills = [];

// ----- SINIFLAR (Modern JS) -----

class Particle {
    constructor(x, y, color, speedScale = 1) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4 * speedScale;
        this.vy = (Math.random() * 3 + 1) * speedScale;
        this.life = 1;
        this.decay = Math.random() * 0.03 + 0.02;
        this.color = color;
        this.size = Math.random() * 6 + 2;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class FloatingText {
    constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1;
        this.vy = -2;
    }
    update() {
        this.y += this.vy;
        this.life -= 0.02;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.font = "bold 24px 'Fredoka One'";
        ctx.fillStyle = this.color;
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.strokeText(this.text, this.x, this.y);
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1;
    }
}

class Obstacle {
    constructor(type) {
        this.x = width + 50;
        this.width = Math.random() * 40 + 60; // 60-100 px genişlik
        this.type = type; // 'BOTTOM' (Peri bacası) veya 'TOP' (Sarkan kaya/mağara)
        this.height = Math.random() * (height * 0.4) + (height * 0.15);
        this.passed = false;
        this.colorIndex = Math.floor(Math.random() * 3);
    }
    update() {
        this.x -= gameSpeed;
    }
    draw() {
        const colors = [
            { body: '#C28B5E', top: '#996633' },
            { body: '#D99B6A', top: '#A67345' },
            { body: '#B07A4F', top: '#805529' }
        ];
        const c = colors[this.colorIndex];
        
        ctx.fillStyle = c.body;
        ctx.beginPath();
        
        if (this.type === 'BOTTOM') {
            // Klasik Peri Bacası
            ctx.moveTo(this.x, height);
            ctx.lineTo(this.x + this.width * 0.3, height - this.height);
            ctx.lineTo(this.x + this.width * 0.7, height - this.height);
            ctx.lineTo(this.x + this.width, height);
            ctx.fill();
            
            // Şapka
            ctx.fillStyle = c.top;
            ctx.beginPath();
            ctx.ellipse(this.x + this.width / 2, height - this.height, this.width * 0.45, 15, 0, 0, Math.PI * 2);
            ctx.fill();
        } else {
            // Üst Engel
            ctx.moveTo(this.x, 0);
            ctx.lineTo(this.x + this.width * 0.3, this.height);
            ctx.lineTo(this.x + this.width * 0.7, this.height);
            ctx.lineTo(this.x + this.width, 0);
            ctx.fill();
            
            ctx.fillStyle = c.top;
            ctx.beginPath();
            ctx.ellipse(this.x + this.width / 2, this.height, this.width * 0.45, 15, 0, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

class Bird {
    constructor() {
        this.x = width + 50;
        this.y = Math.random() * (height * 0.6) + (height * 0.2);
        this.baseY = this.y;
        this.radius = 12;
        this.speed = gameSpeed * 1.3;
        this.angle = Math.random() * Math.PI * 2;
        this.flapSpeed = 0.2;
    }
    update() {
        this.x -= this.speed;
        this.angle += 0.1;
        this.y = this.baseY + Math.sin(this.angle) * 30; // Sine dalgası hareketi
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Gövde
        ctx.fillStyle = '#222';
        ctx.beginPath();
        ctx.ellipse(0, 0, this.radius, this.radius * 0.7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Kanatlar (Animasyonlu)
        const wingY = Math.sin(frames * this.flapSpeed) * 15;
        ctx.fillStyle = '#444';
        ctx.beginPath();
        ctx.moveTo(0, -this.radius * 0.5);
        ctx.quadraticCurveTo(-15, wingY - 10, -5, wingY);
        ctx.closePath();
        ctx.fill();
        
        // Göz
        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(this.radius * 0.5, -2, 2, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
    }
}

class Fuel {
    constructor() {
        this.x = width + 30;
        this.y = Math.random() * (height - 150) + 75;
        this.radius = 16;
        this.pulse = 0;
    }
    update() {
        this.x -= gameSpeed;
        this.pulse += 0.1;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Parlama (Glow)
        const glowRadius = this.radius + Math.sin(this.pulse) * 4;
        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, glowRadius + 10);
        grad.addColorStop(0, 'rgba(255, 153, 51, 0.8)');
        grad.addColorStop(1, 'rgba(255, 153, 51, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, glowRadius + 10, 0, Math.PI * 2);
        ctx.fill();

        // Ana Obje
        ctx.fillStyle = '#FF9933';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('F', 0, 1);
        
        ctx.restore();
    }
}

// ----- SPAWN & LOGIC -----

function spawnEntities() {
    // Engel Spawn Oranı: Seviyeye göre zorlaşır
    let spawnRate = Math.max(70, 140 - (level * 10)); 
    
    if (frames % spawnRate === 0) {
        // Alt veya üst engel
        if (Math.random() > 0.4) {
            obstacles.push(new Obstacle('BOTTOM'));
        }
        if (Math.random() > 0.6) {
            // Biraz gecikmeli üst engel
            setTimeout(() => { if(state === 'PLAYING') obstacles.push(new Obstacle('TOP')); }, 500);
        }
    }

    // Kuş Spawn
    if (frames % (spawnRate * 1.5) === 0 && Math.random() > 0.3) {
        birds.push(new Bird());
    }

    // Yakıt Spawn (Daha sık)
    if (frames % 90 === 0 && Math.random() > 0.2) {
        fuels.push(new Fuel());
    }
}

function checkCollisions() {
    const hitboxR = balloon.radius * 0.8; // Biraz daha affedici hitbox

    // Engeller (Peri Bacaları)
    for (let obs of obstacles) {
        // Puanlama mantığı
        if (!obs.passed && balloon.x > obs.x + obs.width) {
            obs.passed = true;
            score += 10;
            updateScoreUI();
            checkLevelUp();
        }

        // Çarpışma
        if (balloon.x + hitboxR > obs.x && balloon.x - hitboxR < obs.x + obs.width) {
            if (obs.type === 'BOTTOM' && balloon.y + hitboxR > height - obs.height) triggerGameOver();
            if (obs.type === 'TOP' && balloon.y - hitboxR < obs.height) triggerGameOver();
        }
    }

    // Kuşlar
    for (let b of birds) {
        const dx = balloon.x - b.x;
        const dy = balloon.y - b.y;
        if (Math.hypot(dx, dy) < hitboxR + b.radius * 0.8) {
            triggerGameOver();
        }
    }

    // Yakıt
    for (let i = fuels.length - 1; i >= 0; i--) {
        const f = fuels[i];
        const dx = balloon.x - f.x;
        const dy = balloon.y - f.y;
        if (Math.hypot(dx, dy) < hitboxR + f.radius) {
            fuel = Math.min(100, fuel + 25);
            updateFuelUI();
            
            // Partikül efekti
            for(let p=0; p<10; p++) particles.push(new Particle(f.x, f.y, '#00CC66', 2));
            floatingTexts.push(new FloatingText(f.x, f.y - 20, "+FUEL", "#00FF66"));
            
            fuels.splice(i, 1);
        }
    }

    // Zemin ve Tavan çarpışması
    if (balloon.y + balloon.radius >= height || balloon.y - balloon.radius <= 0) {
        triggerGameOver();
    }
}

function checkLevelUp() {
    if (score > level * 100) {
        level++;
        gameSpeed += 0.4;
        floatingTexts.push(new FloatingText(width/2, height/3, "SEVİYE " + level + "!", "#FFB347"));
    }
}

// ----- ÇİZİM (RENDER) FONKSİYONLARI -----

function drawBackground() {
    // Gündüz/Gece döngüsü (Seviyeye bağlı renk değişimi)
    let skyColor1, skyColor2;
    if (level < 3) {
        skyColor1 = '#87CEEB'; skyColor2 = '#E0F6FF'; // Gündüz
    } else if (level < 5) {
        skyColor1 = '#FF7E5F'; skyColor2 = '#FEB47B'; // Gün batımı
    } else {
        skyColor1 = '#1A1A2E'; skyColor2 = '#16213E'; // Gece
    }

    const grad = ctx.createLinearGradient(0, 0, 0, height);
    grad.addColorStop(0, skyColor1);
    grad.addColorStop(1, skyColor2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    // Parallax Dağlar/Tepeler
    ctx.fillStyle = level >= 5 ? '#0F3460' : 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
        let x = (i * 200 - (frames * 0.5) % 400);
        ctx.moveTo(x, height);
        ctx.lineTo(x + 100, height - 150);
        ctx.lineTo(x + 200, height);
    }
    ctx.fill();
}

function drawBalloon() {
    ctx.save();
    ctx.translate(balloon.x, balloon.y);
    
    // Yükselirken yukarı, düşerken aşağı eğim efekti
    balloon.tilt = balloon.vy * 0.05;
    ctx.rotate(balloon.tilt);

    // Ateş Partikülleri (Basılı tutulurken)
    if (isTouching && fuel > 0 && frames % 2 === 0) {
        particles.push(new Particle(balloon.x, balloon.y + 25, '#FF3300'));
        particles.push(new Particle(balloon.x, balloon.y + 25, '#FFCC00'));
    }

    // Gölgelendirme (Juicy effect)
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 15;
    ctx.shadowOffsetY = 5;

    // Balon Zarfı (Küp/Yuvarlak Karışımı modern stil)
    const bGrad = ctx.createRadialGradient(0, -10, 5, 0, 0, balloon.radius);
    bGrad.addColorStop(0, '#FF5E3A');
    bGrad.addColorStop(1, '#C94225');
    
    ctx.fillStyle = bGrad;
    ctx.beginPath();
    // Gözyaşı damlası / klasik balon şekli
    ctx.moveTo(0, balloon.radius * 1.2); 
    ctx.bezierCurveTo(balloon.radius * 1.2, balloon.radius * 0.5, balloon.radius * 1.2, -balloon.radius, 0, -balloon.radius);
    ctx.bezierCurveTo(-balloon.radius * 1.2, -balloon.radius, -balloon.radius * 1.2, balloon.radius * 0.5, 0, balloon.radius * 1.2);
    ctx.fill();

    // Desen / Çizgiler
    ctx.fillStyle = '#FFB347';
    ctx.beginPath();
    ctx.ellipse(0, -5, balloon.radius * 0.3, balloon.radius * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // İpler ve Sepet
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-8, balloon.radius + 2); ctx.lineTo(-12, balloon.radius + 20);
    ctx.moveTo(8, balloon.radius + 2); ctx.lineTo(12, balloon.radius + 20);
    ctx.stroke();

    ctx.fillStyle = '#6B4226'; // Sepet Rengi
    ctx.fillRect(-15, balloon.radius + 20, 30, 15);
    // Sepet detayı
    ctx.fillStyle = '#8B5A33';
    ctx.fillRect(-15, balloon.radius + 20, 30, 4);

    // Ateş Işığı
    if (isTouching && fuel > 0) {
        ctx.fillStyle = 'rgba(255, 200, 0, 0.8)';
        ctx.beginPath();
        ctx.moveTo(-5, balloon.radius + 2);
        ctx.lineTo(0, balloon.radius + 15 + Math.random() * 5);
        ctx.lineTo(5, balloon.radius + 2);
        ctx.fill();
    }

    ctx.restore();
}

// ----- UI & KONTROL YARDIMCILARI -----

function updateScoreUI() {
    currentScoreEl.innerText = score;
    // Score artınca ufak animasyon
    currentScoreEl.style.transform = "scale(1.3)";
    setTimeout(() => currentScoreEl.style.transform = "scale(1)", 100);
}

function updateFuelUI() {
    const percent = Math.max(0, (fuel / 100) * 100);
    fuelFillEl.style.width = percent + "%";
}

// ----- OYUN DÖNGÜSÜ -----

function resetGame() {
    balloon.y = height / 2;
    balloon.vy = 0;
    score = 0;
    fuel = 100;
    level = 1;
    gameSpeed = 3.5;
    frames = 0;
    
    obstacles = [];
    birds = [];
    fuels = [];
    particles = [];
    floatingTexts = [];
    
    updateScoreUI();
    updateFuelUI();
    balloon.x = width * 0.25; // Pozisyon sıfırla
}

function triggerGameOver() {
    state = 'GAMEOVER';
    container.classList.add('shake');
    setTimeout(() => container.classList.remove('shake'), 400);
    
    // Ölüm Partikülleri
    for(let i=0; i<30; i++) {
        particles.push(new Particle(balloon.x, balloon.y, ['#FF5E3A', '#FFB347', '#333'][Math.floor(Math.random()*3)], 3));
    }
    
    finalScoreEl.innerText = score;
    finalLevelEl.innerText = level;
    gameoverScreen.classList.add('active');
}

function loop() {
    // Temizle
    ctx.clearRect(0, 0, width, height);

    if (state === 'MENU') {
        drawBackground();
        drawBalloon();
        // Balon menüde süzülsün
        balloon.y = height/2 + Math.sin(Date.now() / 300) * 20;
    } 
    else if (state === 'PLAYING') {
        frames++;
        drawBackground();

        // Fizik
        if (isTouching && fuel > 0) {
            balloon.vy += balloon.lift;
            fuel -= 0.3; // Yakıt tüketimi
            if(fuel < 0) fuel = 0;
            updateFuelUI();
        }
        balloon.vy += balloon.gravity;
        // Hız limiti
        if (balloon.vy > balloon.terminalVelocity) balloon.vy = balloon.terminalVelocity;
        if (balloon.vy < -balloon.terminalVelocity) balloon.vy = -balloon.terminalVelocity;
        
        balloon.y += balloon.vy;

        spawnEntities();
        checkCollisions();

        // Engelleri Güncelle ve Çiz
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();
            if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1);
        }

        // Yakıtları Güncelle ve Çiz
        for (let i = fuels.length - 1; i >= 0; i--) {
            fuels[i].update();
            fuels[i].draw();
            if (fuels[i].x + fuels[i].radius < 0) fuels.splice(i, 1);
        }

        // Kuşları Güncelle ve Çiz
        for (let i = birds.length - 1; i >= 0; i--) {
            birds[i].update();
            birds[i].draw();
            if (birds[i].x + birds[i].radius < 0) birds.splice(i, 1);
        }

        drawBalloon();

    } 
    else if (state === 'GAMEOVER') {
        drawBackground();
        // Sadece kalan objeleri ve partikülleri çiz (hareket yok)
        obstacles.forEach(o => o.draw());
        birds.forEach(b => b.draw());
        // Balon düşüşü simüle et
        balloon.vy += balloon.gravity;
        balloon.y += balloon.vy;
        if(balloon.y < height + 50) drawBalloon();
    }

    // Partiküller (Her durumda çalışsın)
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
    
    // Kayan Yazılar
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        floatingTexts[i].update();
        floatingTexts[i].draw();
        if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
    }

    requestAnimationFrame(loop);
}

// ----- EVENT LISTENERS (Girdi Kontrolleri) -----

function handleInputStart(e) {
    if(e.type === 'touchstart') e.preventDefault();
    if (state === 'MENU') {
        menuScreen.classList.remove('active');
        resetGame();
        state = 'PLAYING';
    } else if (state === 'GAMEOVER') {
        // Butona tıklamayı engellememek için ekran dokunuşunu oyun bittikten hemen sonra almayalım
        // Restart butonu hallediyor.
    } else if (state === 'PLAYING') {
        isTouching = true;
    }
}

function handleInputEnd(e) {
    if(e.type === 'touchend') e.preventDefault();
    isTouching = false;
}

// Tüm ekrana dokunma
container.addEventListener('touchstart', handleInputStart, {passive: false});
container.addEventListener('touchend', handleInputEnd, {passive: false});
container.addEventListener('mousedown', handleInputStart);
window.addEventListener('mouseup', handleInputEnd);

// Butonlar
document.getElementById('startBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    menuScreen.classList.remove('active');
    resetGame();
    state = 'PLAYING';
});

document.getElementById('restartBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    gameoverScreen.classList.remove('active');
    resetGame();
    state = 'PLAYING';
});

// Oyunu Başlat
requestAnimationFrame(loop);

</script>
</body>
</html>
