<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Cappadocia Balloon Ultimate - Remastered</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

    body { 
        margin: 0; 
        overflow: hidden; 
        background: #000; 
        font-family: 'Poppins', sans-serif; 
        -webkit-tap-highlight-color: transparent;
    }
    
    canvas { display: block; }

    #ui { position: absolute; inset: 0; pointer-events: none; }
    
    /* Glassmorphism UI Elements */
    .glass {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .pointer-auto { pointer-events: auto; }
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">

    <div id="hud" class="absolute top-4 left-1/2 -translate-x-1/2 w-[85%] max-w-sm glass rounded-xl p-2.5 flex justify-between items-center text-white opacity-0 transition-opacity">
        <div class="flex flex-col items-center gap-1">
            <span class="text-xs text-gray-300 uppercase tracking-wider">Distance</span>
            <span id="score" class="text-xl font-bold text-orange-400">0 m</span>
        </div>
        
        <div class="flex-grow max-w-[50%] mx-3 flex flex-col gap-1 items-center">
             <span id="difficulty" class="text-sm font-semibold text-blue-300">Breeze</span>
            <div class="w-full h-2 bg-gray-900 rounded-full overflow-hidden border border-gray-600 relative">
                <div id="fuelFill" class="h-full bg-gradient-to-r from-red-500 via-yellow-400 to-green-500 w-full transition-all duration-200"></div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-1">
            <span class="text-xs text-gray-300 uppercase tracking-wider">Fuel</span>
            <span id="fuelPerc" class="text-sm font-medium">100%</span>
        </div>
    </div>

    <div id="menu" class="absolute inset-0 flex justify-center items-center pointer-auto z-50 bg-black/40 backdrop-blur-sm">
        <div class="glass p-8 rounded-3xl text-center max-w-sm w-[90%] transform scale-90 opacity-0" id="menuCard">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-red-600 mb-2 drop-shadow-lg">CAPPADOCIA</h1>
            <h2 class="text-xl font-bold text-white tracking-widest mb-8">ULTIMATE FLIGHT</h2>
            
            <button onclick="startGame()" class="w-full py-4 rounded-full bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold text-xl shadow-[0_0_20px_rgba(249,115,22,0.5)] hover:scale-105 active:scale-95 transition-transform">
                START FLIGHT
            </button>
            <p class="mt-4 text-gray-300 text-sm">Tap and hold to ignite the burner!</p>
        </div>
    </div>

    <div id="gameover" class="absolute inset-0 flex justify-center items-center pointer-auto z-50 bg-black/60 backdrop-blur-md hidden">
        <div class="glass p-8 rounded-3xl text-center max-w-sm w-[90%] border-red-500/50 border-2 shadow-[0_0_40px_rgba(239,68,68,0.3)]">
            <h1 class="text-5xl font-black text-red-500 mb-4 drop-shadow-md">CRASHED!</h1>
            <p class="text-gray-300 text-lg uppercase tracking-wider mb-1">Final Distance</p>
            <p id="finalScore" class="text-4xl font-bold text-white mb-8">0 m</p>
            
            <button onclick="restart()" class="w-full py-4 rounded-full bg-white text-black font-black text-xl hover:bg-gray-200 active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span>🔄</span> TRY AGAIN
            </button>
        </div>
    </div>

</div>

<script>
// ================= CANVAS & ENGINE =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W, H;
let scale_f = 1; // Global scale factor (smaller means further)

function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    scale_f = H / 800; // Base scaling on H, reference 800px
}
resize();
window.addEventListener("resize", resize);

// ================= STATE =================
const STATE = {MENU: 0, PLAY: 1, OVER: 2};
let gameState = STATE.MENU;

// ================= VARIABLES =================
let balloon, wind, fuel, score;
let chimneys = [], birds = [], fuels = [], particles = [], mountains = [];
let press = false;
let time = 0;

// ================= INPUT =================
window.addEventListener("touchstart", (e) => { if(gameState===STATE.PLAY) press = true; }, {passive: false});
window.addEventListener("touchend", () => press = false);
window.addEventListener("mousedown", () => { if(gameState===STATE.PLAY) press = true; });
window.addEventListener("mouseup", () => press = false);

// ================= INIT / RESET =================
function reset() {
    balloon = { x: W * 0.3, y: H * 0.5, vy: 0, gravity: 0.2 * scale_f, lift: -0.6 * scale_f, drag: 0.98, r: 20 * scale_f };
    wind = { force: 1 };
    fuel = 100;
    score = 0;
    time = 0;
    chimneys = []; birds = []; fuels = []; particles = [];
    
    // Parallax mountains with slower and less chaotic movements
    mountains = [
        { y: H * 0.5, color: '#C86B3C', speed: 0.1, offset: 0 },
        { y: H * 0.65, color: '#A04B28', speed: 0.25, offset: 0 },
        { y: H * 0.8, color: '#7D321E', speed: 0.4, offset: 0 }
    ];
}
reset();

// ================= PARTICLES =================
function createFireParticles() {
    if(press && fuel > 0 && Math.random() > 0.5) {
        particles.push({
            x: balloon.x,
            y: balloon.y + balloon.r * 1.5,
            vx: (Math.random() - 0.5) * 2 * scale_f,
            vy: (Math.random() * 3 + 2) * scale_f,
            life: 1,
            color: Math.random() > 0.5 ? '#FF4500' : '#FFA500',
            size: (Math.random() * 3 + 1) * scale_f
        });
    }
}

function createCollectParticles(x, y) {
    for(let i=0; i<10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 6 * scale_f,
            vy: (Math.random() - 0.5) * 6 * scale_f,
            life: 1,
            color: '#FFFF00',
            size: (Math.random() * 4 + 2) * scale_f
        });
    }
}

function updateDrawParticles() {
    ctx.save();
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx - wind.force * 0.5; // affected less by wind
        p.y += p.vy;
        p.life -= 0.03;
        p.size *= 0.95;

        if (p.life <= 0) {
            particles.splice(i, 1);
            continue;
        }

        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

// ================= SPAWN =================
let lastSpawn = 0;
function spawnObjects(){
    // Spawn objects at W + further distance to give more time
    if(Date.now() - lastSpawn > 1800 - (wind.force * 120)){
        
        // Spawn Chimney
        chimneys.push({
            x: W + 150 * scale_f,
            w: (70 + Math.random()*30) * scale_f,
            h: (120 + Math.random()*220) * scale_f,
            seed: Math.random() // for texturing
        });

        // Spawn Bird
        if(Math.random() > 0.45){
            birds.push({
                x: W + 150 * scale_f,
                y: (50 * scale_f) + Math.random() * (H - 180 * scale_f),
                size: 10 * scale_f,
                speed: (2.5 + Math.random() * 2.5) * scale_f,
                flapSpeed: 0.12 + Math.random() * 0.08
            });
        }

        // Spawn Fuel
        if(Math.random() > 0.6){
            fuels.push({
                x: W + 150 * scale_f,
                y: (80 * scale_f) + Math.random() * (H - 250 * scale_f),
                size: 15 * scale_f,
                pulse: Math.random() * Math.PI
            });
        }
        lastSpawn = Date.now();
    }
}

// ================= UPDATE =================
function updateGame(){
    time++;

    // Player Physics
    if(press && fuel > 0){
        balloon.vy += balloon.lift;
        fuel -= 0.22; // Slower drain
    }
    balloon.vy += balloon.gravity;
    balloon.vy *= balloon.drag;
    balloon.y += balloon.vy;

    // Bounds Check - smaller buffer with scaling
    if(balloon.y < -40 * scale_f || balloon.y > H + 40 * scale_f) triggerGameOver();

    createFireParticles();

    // Move & Collide Chimneys
    for (let i = chimneys.length - 1; i >= 0; i--) {
        let c = chimneys[i];
        c.x -= wind.force + 1.8 * scale_f;

        // Collision Hitbox - smaller and scaled
        let hitX = balloon.x + 12 * scale_f > c.x && balloon.x - 12 * scale_f < c.x + c.w;
        let hitY = balloon.y + 20 * scale_f > H - c.h;
        
        if (hitX && hitY) triggerGameOver();
        if (c.x < -180 * scale_f) chimneys.splice(i, 1);
    }

    // Move & Collide Birds
    for (let i = birds.length - 1; i >= 0; i--) {
        let b = birds[i];
        b.x -= wind.force + b.speed;
        b.y += Math.sin(time * b.flapSpeed) * 1.2 * scale_f;

        let dx = balloon.x - b.x;
        let dy = balloon.y - b.y;
        // Scaled collision radius
        if (Math.sqrt(dx*dx + dy*dy) < 25 * scale_f) triggerGameOver();
        if (b.x < -60 * scale_f) birds.splice(i, 1);
    }

    // Move & Collide Fuel
    for (let i = fuels.length - 1; i >= 0; i--) {
        let f = fuels[i];
        f.x -= wind.force + 1.8 * scale_f;

        let dx = balloon.x - f.x;
        let dy = balloon.y - f.y;
        // Scaled collision radius
        if (Math.sqrt(dx*dx + dy*dy) < 30 * scale_f) {
            fuel = Math.min(100, fuel + 35);
            createCollectParticles(f.x, f.y);
            fuels.splice(i, 1);
        } else if (f.x < -60 * scale_f) {
            fuels.splice(i, 1);
        }
    }

    // Difficulty & HUD
    wind.force += 0.0004;
    score += 0.12 * scale_f; // Distance scale

    let level = "Breeze";
    let windColor = "text-blue-300";
    if(wind.force > 2) { level = "Strong"; windColor = "text-yellow-400"; }
    if(wind.force > 3.2) { level = "Gale"; windColor = "text-red-500"; }

    document.getElementById("score").innerText = Math.floor(score) + " m";
    
    let diffEl = document.getElementById("difficulty");
    diffEl.innerText = level;
    diffEl.className = `text-sm font-semibold ${windColor}`;
    
    document.getElementById("fuelFill").style.width = fuel + "%";
    document.getElementById("fuelPerc").innerText = Math.floor(fuel) + "%";
}

// ================= DRAWING =================
function drawSky(){
    // Beautiful Sunrise Gradient
    let g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#2A1B3D");
    g.addColorStop(0.4, "#D83F87");
    g.addColorStop(1, "#FF8C42");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Glowing Sun
    ctx.save();
    ctx.beginPath();
    ctx.arc(W * 0.82, H * 0.38, 70 * scale_f, 0, Math.PI * 2);
    let sunGlow = ctx.createRadialGradient(W*0.82, H*0.38, 30*scale_f, W*0.82, H*0.38, 140*scale_f);
    sunGlow.addColorStop(0, "rgba(255, 235, 59, 0.9)");
    sunGlow.addColorStop(1, "rgba(255, 235, 59, 0)");
    ctx.fillStyle = sunGlow;
    ctx.fill();
    ctx.restore();
}

function drawMountains() {
    mountains.forEach((m) => {
        // Less chaotic movimiento
        m.offset = (m.offset - m.speed - wind.force * 0.3) % W;
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.moveTo(0, H);
        
        // Less "wavy" mountains
        for (let x = 0; x <= W + 100; x += 100 * scale_f) {
            let actualX = x + m.offset;
            let currentY = m.y + Math.sin((actualX) * 0.008) * 35 * scale_f;
            ctx.lineTo(x, currentY);
        }
        ctx.lineTo(W, H);
        ctx.fill();
    });
}

// Helper to draw speckled rock texture
function drawRockTexture(x, y, w, h, seed) {
    ctx.fillStyle = "rgba(0,0,0,0.06)";
    let speckCount = Math.floor(w * h * 0.015);
    for(let i=0; i<speckCount; i++) {
        let speckX = x + (Math.sin(seed + i * 1.5) * 0.5 + 0.5) * w;
        let speckY = y + (Math.cos(seed * 0.8 + i * 2) * 0.5 + 0.5) * h;
        let size = (Math.random() * 1.5 + 0.5) * scale_f;
        ctx.beginPath();
        ctx.arc(speckX, speckY, size, 0, Math.PI*2);
        ctx.fill();
    }
}

function drawChimneys(){
    chimneys.forEach(c => {
        let x = c.x;
        let y = H - c.h;

        // Base with 3D gradient and speckle texture
        let grad = ctx.createLinearGradient(x, 0, x + c.w, 0);
        grad.addColorStop(0, "#D38A59");
        grad.addColorStop(0.5, "#E2A475");
        grad.addColorStop(1, "#A05A35");
        ctx.fillStyle = grad;

        ctx.beginPath();
        ctx.moveTo(x - 8 * scale_f, H);
        ctx.lineTo(x + c.w * 0.15, y);
        ctx.lineTo(x + c.w * 0.85, y);
        ctx.lineTo(x + c.w + 8 * scale_f, H);
        ctx.fill();
        
        // Texture on base
        ctx.save();
        ctx.clip(); // Clip texturing to base
        drawRockTexture(x-8*scale_f, y, c.w + 16*scale_f, c.h, c.seed);
        ctx.restore();

        // Hat / Cap - More organic, textured taş shape
        let capGrad = ctx.createLinearGradient(x, y-15*scale_f, x, y);
        capGrad.addColorStop(0, "#6D4C41");
        capGrad.addColorStop(1, "#4E342E");
        
        ctx.beginPath();
        ctx.moveTo(x - 12 * scale_f, y + 8 * scale_f);
        // Organik eğim
        ctx.bezierCurveTo(
            x - 5*scale_f, y - 35*scale_f,
            x + c.w + 5*scale_f, y - 35*scale_f,
            x + c.w + 12 * scale_f, y + 8 * scale_f
        );
        ctx.fillStyle = capGrad;
        ctx.fill();
        
        // Hat texture
        ctx.save();
        ctx.clip();
        drawRockTexture(x-12*scale_f, y-35*scale_f, c.w+24*scale_f, 43*scale_f, c.seed + 123);
        ctx.restore();
        
    });
}

function drawBirds(){
    ctx.fillStyle = "#111";
    birds.forEach(b => {
        ctx.save();
        ctx.translate(b.x, b.y);
        
        // Wing animation
        let flap = Math.sin(time * b.flapSpeed) * 8 * scale_f;
        
        ctx.beginPath();
        // Body
        ctx.arc(0, 0, 3 * scale_f, 0, Math.PI*2);
        ctx.fill();
        
        // Scaled wings
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(-8 * scale_f, flap - 4 * scale_f, -12 * scale_f, flap);
        ctx.quadraticCurveTo(-4 * scale_f, flap + 1 * scale_f, 0, 0);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(8 * scale_f, flap - 4 * scale_f, 12 * scale_f, flap);
        ctx.quadraticCurveTo(4 * scale_f, flap + 1 * scale_f, 0, 0);
        ctx.fill();

        ctx.restore();
    });
}

function drawFuel(){
    fuels.forEach(f => {
        f.pulse += 0.12;
        let scale = 1 + Math.sin(f.pulse) * 0.14;
        
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.scale(scale, scale);
        
        // Glow and color
        ctx.shadowBlur = 18 * scale_f;
        ctx.shadowColor = "#FFF500";
        ctx.fillStyle = "#FFD700";
        ctx.beginPath();
        ctx.arc(0, 0, f.size, 0, Math.PI * 2);
        ctx.fill();

        // Details
        ctx.fillStyle = "#FFA500";
        ctx.beginPath();
        ctx.arc(0, 0, f.size * 0.6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#FFF";
        ctx.beginPath();
        ctx.moveTo(0, -5 * scale_f);
        ctx.lineTo(3 * scale_f, 3 * scale_f);
        ctx.lineTo(-3 * scale_f, 3 * scale_f);
        ctx.fill();
        
        ctx.restore();
    });
}

// Draw patterns/details on the balloon envelope
function drawBalloonPattern(r) {
    // 3D-ish Gradient shading
    let g = ctx.createRadialGradient(-r*0.3, -r*0.6, r*0.15, 0, -r*0.3, r*1.1);
    g.addColorStop(0, "rgba(255,255,255,0.3)");
    g.addColorStop(0.8, "rgba(0,0,0,0)");
    g.addColorStop(1, "rgba(0,0,0,0.5)");
    ctx.fillStyle = g;
    ctx.fillRect(-r*1.1, -r*1.4, r*2.2, r*2);
    
    // Zigzag/Pattern lines
    ctx.strokeStyle = "rgba(0,0,0,0.2)";
    ctx.lineWidth = 1 * scale_f;
    ctx.beginPath();
    for(let i=0; i<12; i++) {
        let angle = (i / 12) * Math.PI * 2;
        ctx.moveTo(Math.cos(angle)*r*0.9, -r*0.3);
        ctx.lineTo(Math.cos(angle + 0.3)*r, -r*0.1);
    }
    ctx.stroke();
}

function drawBalloon(){
    ctx.save();
    ctx.translate(balloon.x, balloon.y);

    let tilt = balloon.vy * 0.035; // Tilt factor scaled vertically
    ctx.rotate(tilt);

    let r = balloon.r;

    // Burner Flame (if pressing)
    if(press && fuel > 0){
        ctx.shadowBlur = 25 * scale_f;
        ctx.shadowColor = "#FF5722";
        ctx.fillStyle = "#FFC107";
        ctx.beginPath();
        ctx.moveTo(-6 * scale_f, r * 1.3);
        ctx.lineTo(0, r * 1.3 + (Math.random()*22 + 8) * scale_f);
        ctx.lineTo(6 * scale_f, r * 1.3);
        ctx.fill();
        ctx.shadowBlur = 0; // reset
    }

    // Ropes - Scaled and colored
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.lineWidth = 1 * scale_f;
    ctx.beginPath();
    ctx.moveTo(-r*0.6, r*0.5); ctx.lineTo(-r*0.4, r*1.3);
    ctx.moveTo(r*0.6, r*0.5); ctx.lineTo(r*0.4, r*1.3);
    ctx.stroke();

    // Basket - detailed and scaled
    let basketGrad = ctx.createLinearGradient(-r*0.5, r*1.3, r*0.5, r*1.3);
    basketGrad.addColorStop(0, "#5D4037");
    basketGrad.addColorStop(1, "#795548");
    ctx.fillStyle = basketGrad;
    ctx.fillRect(-r*0.5, r*1.3, r*1, r*0.7);
    
    ctx.fillStyle = "#3E2723"; // Rim
    ctx.fillRect(-r*0.6, r*1.2, r*1.2, r*0.15);
    
    // Speckle texture on basket
    ctx.fillStyle = "rgba(0,0,0,0.15)";
    for(let i=0; i<15; i++) {
        ctx.fillRect(
            (-r*0.5) + Math.random()*r,
            (r*1.3) + Math.random()*r*0.7,
            1.5*scale_f, 1.5*scale_f
        );
    }

    // Envelope (Balloon itself) - Scaled and Patterned
    // Create striped pattern using clip and gradients
    ctx.beginPath();
    ctx.arc(0, -r*0.3, r*1.05, 0, Math.PI*2);
    ctx.clip(); // Clip to circle

    // Stripes with better colors
    let colors = ["#E63946", "#F1FAEE", "#A8DADC", "#457B9D", "#1D3557"];
    let stripeCount = 6;
    let stripeWidth = (r*2.1) / stripeCount;
    for(let i = 0; i < stripeCount; i++) {
        ctx.fillStyle = colors[i % colors.length];
        ctx.fillRect(-r*1.05 + i * stripeWidth, -r*1.4, stripeWidth, r*2);
    }
    
    // Add patterns and spherical shading
    drawBalloonPattern(r*1.05);

    ctx.restore();
}

// ================= LOOP =================
function loop(){
    if(gameState === STATE.PLAY){
        updateGame();
        spawnObjects();
    }
    
    // Always draw (to keep background alive during menus)
    ctx.clearRect(0,0,W,H);
    drawSky();
    drawMountains();
    drawChimneys();
    drawBirds();
    drawFuel();
    updateDrawParticles();
    
    if(gameState !== STATE.MENU) drawBalloon();

    requestAnimationFrame(loop);
}

// ================= UI CONTROLS & GSAP ANIMATIONS =================
window.onload = () => {
    // Initial Menu Animation
    gsap.to("#menuCard", { duration: 0.8, scale: 1, opacity: 1, ease: "back.out(1.5)" });
    loop();
};

function startGame(){
    reset();
    
    // Animate Menu Out
    gsap.to("#menu", { duration: 0.4, opacity: 0, onComplete: () => {
        document.getElementById("menu").style.display = "none";
        gameState = STATE.PLAY;
    }});

    // Animate HUD In - less intrusive
    gsap.to("#hud", { duration: 0.4, y: 10, opacity: 1, delay: 0.3, ease: "power2.out" });
}

function triggerGameOver(){
    if(gameState === STATE.OVER) return;
    gameState = STATE.OVER;
    
    document.getElementById("finalScore").innerText = Math.floor(score) + " m";
    
    // Create big explosion
    for(let i=0; i<25; i++) createFireParticles();

    // Hide HUD
    gsap.to("#hud", { duration: 0.3, opacity: 0, y: -20 });

    // Show Game Over
    let go = document.getElementById("gameover");
    go.style.display = "flex";
    gsap.fromTo(go, {opacity: 0}, {duration: 0.5, opacity: 1});
    gsap.fromTo(go.children[0], {scale: 0.5, rotation: -10}, {duration: 0.7, scale: 1, rotation: 0, ease: "elastic.out(1, 0.5)"});
}

function restart(){
    gsap.to("#gameover", { duration: 0.3, opacity: 0, onComplete: () => {
        document.getElementById("gameover").style.display = "none";
        
        // Show menu again
        document.getElementById("menu").style.display = "flex";
        gsap.to("#menu", { duration: 0.3, opacity: 1 });
        gsap.fromTo("#menuCard", {scale: 0.8, opacity: 0}, {duration: 0.5, scale: 1, opacity: 1, ease: "back.out(1.5)"});
        
        gameState = STATE.MENU;
        reset();
    }});
}
</script>

</body>
</html>
