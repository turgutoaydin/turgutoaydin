<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DeepSeek • Sky Odyssey</title>
  
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
  </script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800;14..32,900&family=Space+Grotesk:wght@600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #020617; 
      overflow: hidden; 
      font-family: 'Inter', system-ui, sans-serif;
      touch-action: none; 
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { 
      display: block; 
      position: absolute;
      top: 0;
      left: 0;
    }

    .ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    
    .glass-panel {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(59, 130, 246, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      color: #e2e8f0;
    }
    
    .play-btn {
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      box-shadow: 0 8px 0 #1e3a8a, 0 20px 30px rgba(37, 99, 235, 0.4);
      border-radius: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      transition: all 0.12s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.15);
      text-shadow: 0 2px 5px rgba(0,0,0,0.4);
      cursor: pointer;
      pointer-events: auto;
      text-transform: uppercase;
      color: white;
      font-family: 'Inter', sans-serif;
    }
    .play-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #1e3a8a, 0 8px 15px rgba(37, 99, 235, 0.5);
    }
    
    .hud-wrapper {
      position: absolute;
      top: max(15px, env(safe-area-inset-top));
      left: max(15px, env(safe-area-inset-left));
      right: max(15px, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      transition: opacity 0.6s;
      gap: 12px;
      flex-wrap: wrap;
    }

    .score-box {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }
    
    .fuel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .fuel-bar-bg {
      background: rgba(0,0,0,0.8);
      border-radius: 12px;
      width: 140px;
      height: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.9);
    }
    
    .fuel-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.7);
      transition: width 0.08s linear, background-color 0.3s;
    }
    .fuel-fill.low {
      background: linear-gradient(90deg, #ef4444, #f43f5e);
      animation: pulseFuel 0.4s infinite alternate;
    }
    
    @keyframes pulseFuel {
      from { box-shadow: 0 0 5px #ef4444; }
      to { box-shadow: 0 0 20px #ef4444; }
    }
    
    .power-row {
      display: flex;
      gap: 12px;
    }
    
    .power-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s;
      filter: grayscale(1);
      opacity: 0.35;
    }
    .power-icon.active {
      filter: grayscale(0);
      opacity: 1;
      border-color: #3b82f6;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.9);
      animation: glowPulse 1.5s infinite;
      transform: scale(1.08);
    }
    @keyframes glowPulse {
      0% { box-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 28px rgba(59, 130, 246, 1); }
      100% { box-shadow: 0 0 8px rgba(59, 130, 246, 0.5); }
    }
    
    .stage-pop {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 8vw, 5rem);
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.9);
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      text-shadow: 0 15px 40px rgba(0,0,0,0.9);
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      white-space: nowrap;
      letter-spacing: 8px;
      pointer-events: none;
    }

    #gameOverScreen {
      background: radial-gradient(circle at center, rgba(2, 6, 23, 0.85) 0%, rgba(0, 0, 0, 0.98) 100%);
    }
    
    .deepseek-gradient {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 25px rgba(59, 130, 246, 0.8));
      animation: floatLogo 3s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    
    .high-score-badge {
      background: rgba(37, 99, 235, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.4);
      border-radius: 12px;
      padding: 4px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #93c5fd;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <div class="ui-layer">
    
    <div id="hudContainer" class="hud-wrapper">
      
      <div class="glass-panel score-box">
        <span style="font-size:1.2rem; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6));">🎯</span>
        <span id="distDisplay" style="font-weight:800; font-size:1.1rem; letter-spacing: 0.5px;">0 m</span>
      </div>
      
      <div class="fuel-container">
        <div class="glass-panel" style="padding: 4px 14px; font-size: 0.8rem; font-weight: 700; color: #93c5fd; letter-spacing: 1px;">YAKIT <span id="fuelDisplay" style="color: #fff;">100%</span></div>
        <div class="fuel-bar-bg">
          <div id="fuelBarFill" class="fuel-fill" style="width: 100%;"></div>
        </div>
      </div>
      
      <div class="power-row">
        <div id="shieldPowerIcon" class="power-icon">🛡️</div>
        <div id="magnetPowerIcon" class="power-icon">🧲</div>
        <div id="boostPowerIcon" class="power-icon">⚡</div>
      </div>
    </div>
    
    <div id="stageAnnounce" class="stage-pop">SEVİYE 2</div>
    
    <div id="menuScreen" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: auto; background: radial-gradient(circle at 50% 30%, rgba(15, 23, 42, 0.7) 0%, rgba(2, 6, 23, 0.95) 100%);">
      <div class="glass-panel" style="padding: 2.5rem 2rem; width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(59, 130, 246, 0.3);">
        <div class="logo-icon">🔷✨</div>
        <h1 style="font-family:'Space Grotesk',sans-serif; font-weight:900; font-size:3rem; margin:0; line-height:1; letter-spacing: 3px;" class="deepseek-gradient">DEEPSEEK</h1>
        <p style="color:#64748b; font-weight:700; margin-bottom:1.8rem; font-size:1rem; letter-spacing: 6px; margin-top: 8px; text-transform: uppercase;">Sky Odyssey</p>
        <div id="highScoreMenu" class="high-score-badge" style="margin-bottom: 20px; display: none;">🏆 En İyi: <span id="highScoreMenuText">0 m</span></div>
        <button id="startBtn" class="play-btn" style="width:100%; padding:20px; color:white; font-size:1.4rem; border:none;">
          KEŞFE BAŞLA
        </button>
        <p style="color:#475569; font-size:0.75rem; margin-top:16px; font-weight:500;">Basılı tutarak yüksel • Bırakarak süzül</p>
      </div>
    </div>
    
    <div id="gameOverScreen" style="position: absolute; inset: 0; display: none; align-items: center; justify-content: center; pointer-events: auto; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
      <div class="glass-panel" style="padding: 2.5rem 2rem; width: 90%; max-width: 400px; text-align: center; border-color: rgba(239, 68, 68, 0.3);">
        <div style="font-size: 4.5rem; filter: drop-shadow(0 0 25px rgba(239,68,68,0.7));">💥</div>
        <h2 style="font-family:'Space Grotesk'; font-weight:900; color:#f87171; font-size:2.2rem; margin:0.5rem 0; letter-spacing: 2px;">DÜŞÜŞ!</h2>
        <p style="color:#94a3b8; font-weight:600; margin-top:12px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Katedilen Mesafe</p>
        <p id="finalDistText" class="deepseek-gradient" style="font-size:3.8rem; font-weight:900; margin:0; text-shadow: 0 4px 20px rgba(59,130,246,0.3);">0 m</p>
        <div id="newHighScoreBadge" style="display: none; color: #fbbf24; font-weight: 800; margin: 8px 0; letter-spacing: 2px; animation: pulseFuel 0.6s infinite alternate;">🌟 YENİ REKOR! 🌟</div>
        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <button id="retryBtn" class="play-btn" style="background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); box-shadow: 0 6px 0 #1e3a8a, 0 15px 25px rgba(37,99,235,0.4); flex:1; padding:16px; color:white; font-size:1.1rem; border:none;">
            TEKRAR DENE
          </button>
          <button id="menuBtn" class="play-btn" style="background: rgba(255,255,255,0.05); box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 15px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); flex:1; padding:16px; color:white; font-size:1.1rem;">
            MENÜ
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      
      let W, H, scale;
      
      function resizeCanvas() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        scale = Math.min(W / 550, H / 950);
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      
      // ---------- SES MOTORU (Web Audio API) ----------
      let audioCtx = null;
      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
          audioCtx = null;
        }
      }
      function playTone(freq, type='sine', duration=0.15, vol=0.08, rampDown=true) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(vol, now);
        if (rampDown) gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.05);
      }
      function sfxCollect() { playTone(880, 'sine', 0.1, 0.1); setTimeout(() => playTone(1100, 'sine', 0.1, 0.1), 80); }
      function sfxShieldBreak() { playTone(200, 'triangle', 0.3, 0.12); }
      function sfxExplosion() { playTone(50, 'sawtooth', 0.5, 0.15, false); playTone(30, 'square', 0.6, 0.1, false); }
      function sfxStageUp() { playTone(660, 'sine', 0.2, 0.12); setTimeout(() => playTone(880, 'sine', 0.2, 0.12), 150); }
      function sfxClick() { playTone(600, 'sine', 0.06, 0.04); }
      
      const STATE = { MENU: 0, PLAYING: 1, OVER: 2, CRASHING: 3 };
      let gameState = STATE.MENU;
      
      let balloon = {
        x: 0, y: 0, vy: 0,
        radius: 36 * scale,
        gravity: 0.22 * scale,
        lift: -0.60 * scale,
        drag: 0.98
      };
      
      let fuel = 100;
      let distance = 0;
      let stage = 1;
      let windSpeed = 3.5;
      
      let chimneys = [];
      let birds = [];
      let stormClouds = [];
      let planes = [];
      let collectibles = [];
      let particles = [];
      let floatingTexts = [];
      let bgClouds = [];
      let mountains = [];
      let stars = [];
      
      let shieldActive = false;
      let magnetActive = false;
      let magnetTimer = 0;
      let boostActive = false;
      let boostTimer = 0;
      
      let pressing = false;
      let screenShake = 0;
      
      // Yüksek skor
      let highScore = 0;
      try {
        const saved = localStorage.getItem('deepseek_sky_odyssey_high');
        if (saved) highScore = parseInt(saved, 10) || 0;
      } catch(e) {}
      
      const skyPalette = [
        { top: "#0b1120", bottom: "#1e1b4b", m1: "#111827", m2: "#0f172a" },
        { top: "#312e81", bottom: "#701a75", m1: "#4338ca", m2: "#4c1d95" },
        { top: "#0369a1", bottom: "#0284c7", m1: "#075985", m2: "#0c4a6e" },
        { top: "#4c1d95", bottom: "#9d174d", m1: "#5b21b6", m2: "#831843" }
      ];
      let currentSky = { ...skyPalette[0] };
      
      const distDisplay = document.getElementById('distDisplay');
      const fuelDisplay = document.getElementById('fuelDisplay');
      const fuelBarFill = document.getElementById('fuelBarFill');
      const hudContainer = document.getElementById('hudContainer');
      const shieldPowerIcon = document.getElementById('shieldPowerIcon');
      const magnetPowerIcon = document.getElementById('magnetPowerIcon');
      const boostPowerIcon = document.getElementById('boostPowerIcon');
      const stageAnnounce = document.getElementById('stageAnnounce');
      const menuScreen = document.getElementById('menuScreen');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const finalDistText = document.getElementById('finalDistText');
      const newHighScoreBadge = document.getElementById('newHighScoreBadge');
      const highScoreMenu = document.getElementById('highScoreMenu');
      const highScoreMenuText = document.getElementById('highScoreMenuText');
      
      function updateUI() {
        distDisplay.textContent = Math.floor(distance) + ' m';
        fuelDisplay.textContent = Math.floor(fuel) + '%';
        fuelBarFill.style.width = fuel + '%';
        
        if(fuel < 25) fuelBarFill.classList.add('low');
        else fuelBarFill.classList.remove('low');
        
        if (shieldActive) shieldPowerIcon.classList.add('active');
        else shieldPowerIcon.classList.remove('active');
        if (magnetActive) magnetPowerIcon.classList.add('active');
        else magnetPowerIcon.classList.remove('active');
        if (boostActive) boostPowerIcon.classList.add('active');
        else boostPowerIcon.classList.remove('active');
      }
      
      function updateHighScoreUI() {
        if (highScore > 0) {
          highScoreMenu.style.display = 'inline-block';
          highScoreMenuText.textContent = highScore + ' m';
        } else {
          highScoreMenu.style.display = 'none';
        }
      }
      updateHighScoreUI();
      
      function initStars() {
        stars = [];
        for(let i=0; i<200; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H * 0.7,
            radius: Math.random() * 1.8 + 0.5,
            twinkle: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.3 + 0.1
          });
        }
      }
      
      function initMountains() {
        mountains = [];
        for(let i=0; i<3; i++) {
          let layer = [];
          for(let j=0; j<W/(80*scale) + 2; j++) {
            layer.push({ x: j*120*scale, y: random(H*0.65, H*0.85) + i*40*scale });
          }
          mountains.push(layer);
        }
      }

      function fullReset() {
        balloon.x = W * 0.35;
        balloon.y = H * 0.5;
        balloon.vy = 0;
        fuel = 100;
        distance = 0;
        stage = 1;
        windSpeed = 3.5;
        shieldActive = false;
        magnetActive = false;
        magnetTimer = 0;
        boostActive = false;
        boostTimer = 0;
        screenShake = 0;
        
        chimneys = [];
        birds = [];
        stormClouds = [];
        planes = [];
        collectibles = [];
        particles = [];
        floatingTexts = [];
        bgClouds = [];
        
        initStars();
        initMountains();
        currentSky = { ...skyPalette[0] };
        updateUI();
      }
      
      function checkStage() {
        let newStage = Math.floor(distance / 500) + 1;
        if (newStage > stage && newStage <= 4) {
          stage = newStage;
          windSpeed += 0.9;
          sfxStageUp();
          gsap.to(currentSky, {
            top: skyPalette[stage-1].top,
            bottom: skyPalette[stage-1].bottom,
            m1: skyPalette[stage-1].m1,
            m2: skyPalette[stage-1].m2,
            duration: 4
          });
          stageAnnounce.textContent = `SEVİYE ${stage}`;
          gsap.fromTo(stageAnnounce, 
            { scale: 0.1, opacity: 0, y: 30 },
            { scale: 1, opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.7)", 
              onComplete: () => gsap.to(stageAnnounce, { opacity: 0, y: -30, delay: 1.8, duration: 0.6 })
            }
          );
        }
      }
      
      let lastSpawn = 0;
      function spawnObjects() {
        let now = performance.now();
        let delay = Math.max(380, 900 - stage * 90);
        if (now - lastSpawn < delay) return;
        lastSpawn = now;
        
        if (Math.random() < 0.6) {
          chimneys.push({
            x: W + 50 * scale,
            width: random(60, 100) * scale,
            height: random(150, 300 + stage * 30) * scale,
            hue: random(250, 290)
          });
        }
        
        if (Math.random() < 0.5) {
          let baseY = random(H * 0.1, H * 0.7);
          let count = Math.floor(random(1, 4));
          for(let i=0; i<count; i++) {
            birds.push({
              x: W + 80 * scale + i*random(20, 50)*scale,
              y: baseY + random(-30, 30)*scale,
              size: random(10, 14) * scale,
              speed: random(4, 7) * scale,
              wingOffset: random(0, Math.PI*2),
              bob: random(0, Math.PI*2)
            });
          }
        }
        
        if (stage >= 2 && Math.random() < 0.4) {
          stormClouds.push({
            x: W + 100 * scale,
            y: random(H * 0.1, H * 0.8),
            radius: random(50, 80) * scale,
            speed: random(3, 5) * scale,
            lightningPhase: 0
          });
        }
        
        if (stage >= 3 && Math.random() < 0.35) {
          planes.push({
            x: W + 120 * scale,
            y: random(H * 0.1, H * 0.7),
            size: random(40, 55) * scale,
            speed: random(8, 12) * scale,
          });
        }
        
        if (Math.random() < 0.6) {
          let r = Math.random();
          let type = 'fuel';
          if (r > 0.9) type = 'shield';
          else if (r > 0.8) type = 'magnet';
          else if (r > 0.7 && stage >= 2) type = 'boost';
          collectibles.push({
            type,
            x: W + 60 * scale,
            y: random(H * 0.15, H * 0.8),
            radius: 16 * scale,
            bobPhase: random(0, Math.PI*2)
          });
        }
      }
      
      function random(a,b) { return Math.random()*(b-a)+a; }
      
      function addExplosion(x,y,color,count=25) {
        for(let i=0;i<count;i++) particles.push({
          x,y, 
          vx: (Math.random()-0.5)*20*scale, 
          vy: (Math.random()-0.5)*20*scale,
          life: 1.2, color, 
          size: random(3, 10)*scale
        });
      }

      function addDeathExplosion(x,y) {
        screenShake = 12 * scale;
        sfxExplosion();
        const colors = ['#f43f5e', '#fbbf24', '#ffffff', '#8b5cf6', '#3b82f6'];
        for(let i=0;i<120;i++) {
          particles.push({
            x: x + random(-30, 30)*scale,
            y: y + random(-30, 30)*scale,
            vx: (Math.random()-0.5)*40*scale,
            vy: (Math.random()-0.5)*40*scale,
            life: random(1, 3.5),
            color: colors[Math.floor(Math.random()*colors.length)],
            size: random(4, 22)*scale
          });
        }
      }

      function addText(txt,x,y,color) { floatingTexts.push({text:txt,x,y,life:1.4,color}); }
      
      function handleHit(type, hitX, hitY) {
        if (shieldActive) {
          shieldActive = false;
          sfxShieldBreak();
          addExplosion(balloon.x, balloon.y, '#60a5fa', 50);
          addText('KALKAN KIRILDI!', balloon.x, balloon.y-40*scale, '#60a5fa');
          updateUI();
          return false;
        }
        if (type === 'storm') {
          fuel = Math.max(0, fuel - 30);
          balloon.vy += 8 * scale;
          addExplosion(hitX, hitY, '#94a3b8', 30);
          addText('-30 YAKIT', balloon.x, balloon.y-35*scale, '#ef4444');
          if (fuel <= 0) { endGame(); return true; }
          return false;
        }
        
        addDeathExplosion(balloon.x, balloon.y);
        endGame();
        return true;
      }
      
      function updateGame() {
        if (gameState !== STATE.PLAYING) {
           for(let i=particles.length-1;i>=0;i--) { 
             let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.02; 
             if(p.life<=0) particles.splice(i,1); 
           }
           if (screenShake > 0) screenShake *= 0.9;
           return;
        }

        if (pressing && fuel > 0) {
          let liftPower = balloon.lift;
          if (boostActive) liftPower *= 1.5;
          balloon.vy += liftPower;
          fuel -= 0.16;
          if (Math.random()<0.5) particles.push({
            x: balloon.x+random(-5,5)*scale, y: balloon.y+balloon.radius*1.1,
            vx: random(-0.4,0.4)*scale, vy: random(1,4)*scale, life:0.8,
            color: boostActive ? '#facc15' : (Math.random() > 0.5 ? '#f59e0b' : '#10b981'),
            size: random(2,6)*scale
          });
        }
        
        balloon.vy += balloon.gravity;
        balloon.vy *= balloon.drag;
        balloon.y += balloon.vy;
        
        if (balloon.y - balloon.radius < -150*scale || balloon.y + balloon.radius*1.45 > H+30*scale) { 
           addDeathExplosion(balloon.x, balloon.y);
           endGame(); 
           return; 
        }
        
        if (magnetActive) {
          magnetTimer -= 0.016;
          if (magnetTimer <= 0) { magnetActive = false; updateUI(); }
        }
        if (boostActive) {
          boostTimer -= 0.016;
          if (boostTimer <= 0) { boostActive = false; updateUI(); }
        }
        
        let bLeft = balloon.x - balloon.radius * 0.85;
        let bRight = balloon.x + balloon.radius * 0.85;
        let bTop = balloon.y - balloon.radius * 0.9;
        let bBottom = balloon.y + balloon.radius * 1.45; 

        for(let i=chimneys.length-1;i>=0;i--) {
          let c=chimneys[i]; 
          c.x -= windSpeed*1.1;
          let cLeft = c.x + c.width*0.1;
          let cRight = c.x + c.width*0.9;
          let cTop = H - c.height;
          if(bRight > cLeft && bLeft < cRight && bBottom > cTop) {
            if(handleHit('chimney', balloon.x, bBottom)) return;
          }
          if(c.x < -200*scale) chimneys.splice(i,1);
        }
        
        for(let i=birds.length-1;i>=0;i--) {
          let b=birds[i]; b.x -= windSpeed*0.8 + b.speed;
          b.y += Math.sin(performance.now()*0.005 + b.bob)*1.5*scale;
          if(b.x > bLeft && b.x < bRight && b.y > bTop && b.y < bBottom) {
            if(handleHit('bird', b.x, b.y)) return;
          }
          if(b.x < -100*scale) birds.splice(i,1);
        }
        
        for(let i=stormClouds.length-1;i>=0;i--) {
          let s=stormClouds[i]; s.x -= windSpeed*0.9 + s.speed; s.lightningPhase++;
          let dist = Math.hypot(balloon.x-s.x, balloon.y-s.y);
          if(dist < balloon.radius + s.radius*0.8) {
            handleHit('storm', s.x, s.y); stormClouds.splice(i,1); continue;
          }
          if(s.x < -200*scale) stormClouds.splice(i,1);
        }
        
        for(let i=planes.length-1;i>=0;i--) {
          let p=planes[i]; p.x -= windSpeed*1.2 + p.speed;
          if(p.x > bLeft - p.size && p.x < bRight + p.size && p.y > bTop - p.size*0.5 && p.y < bBottom + p.size*0.5) {
            if(handleHit('plane', p.x, p.y)) return;
          }
          if(p.x < -200*scale) planes.splice(i,1);
        }
        
        for(let i=collectibles.length-1;i>=0;i--) {
          let c=collectibles[i];
          if(magnetActive && c.type==='fuel') {
            let ang=Math.atan2(balloon.y-c.y, balloon.x-c.x);
            let dist=Math.hypot(balloon.x-c.x, balloon.y-c.y);
            if(dist<450*scale) { c.x+=Math.cos(ang)*15*scale; c.y+=Math.sin(ang)*15*scale; }
            else c.x -= windSpeed*0.8;
          } else c.x -= windSpeed*0.8;
          
          if(c.x > bLeft && c.x < bRight && c.y > bTop && c.y < bBottom) {
            if(c.type==='fuel') { fuel=Math.min(100,fuel+25); sfxCollect(); addExplosion(c.x,c.y,'#10b981',15); }
            else if(c.type==='shield') { shieldActive=true; sfxCollect(); addText('KALKAN!',c.x,c.y-25*scale,'#60a5fa'); }
            else if(c.type==='magnet') { magnetActive=true; magnetTimer=14; sfxCollect(); addText('MIKNATIS!',c.x,c.y-25*scale,'#a78bfa'); }
            else if(c.type==='boost') { boostActive=true; boostTimer=8; sfxCollect(); addText('HIZ!',c.x,c.y-25*scale,'#facc15'); }
            updateUI(); collectibles.splice(i,1);
          } else if(c.x<-100*scale) collectibles.splice(i,1);
        }
        
        for(let i=0; i<mountains.length; i++) {
          let speed = windSpeed * (0.1 + i*0.1);
          for(let j=0; j<mountains[i].length; j++) {
            mountains[i][j].x -= speed;
          }
          if(mountains[i][0].x < -150*scale) {
            mountains[i].shift();
            let lastX = mountains[i][mountains[i].length-1].x;
            mountains[i].push({ x: lastX + 120*scale, y: random(H*0.65, H*0.85) + i*40*scale });
          }
        }

        if (Math.random() < 0.03) {
          bgClouds.push({
            x: W + 100*scale,
            y: random(0, H * 0.6),
            size: random(40, 100) * scale,
            speed: random(0.2, 0.6),
            opacity: random(0.03, 0.15)
          });
        }

        for(let i=particles.length-1;i>=0;i--) { let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.025; if(p.life<=0) particles.splice(i,1); }
        for(let i=floatingTexts.length-1;i>=0;i--) { floatingTexts[i].y-=1.5*scale; floatingTexts[i].life-=0.02; if(floatingTexts[i].life<=0) floatingTexts.splice(i,1); }
        for(let i=bgClouds.length-1;i>=0;i--) { bgClouds[i].x -= windSpeed*0.3 + bgClouds[i].speed; if(bgClouds[i].x<-200*scale) bgClouds.splice(i,1); }
        for(let i=stars.length-1;i>=0;i--) { stars[i].x -= stars[i].speed * 0.2; if(stars[i].x < -10) { stars[i].x = W + 10; stars[i].y = Math.random() * H * 0.7; } }
        
        windSpeed+=0.0008;
        distance+= (windSpeed * (boostActive ? 0.18 : 0.12));
        checkStage();
        if (screenShake > 0) screenShake *= 0.85;
        updateUI();
      }
      
      function drawSky() {
        let g=ctx.createLinearGradient(0,0,0,H);
        g.addColorStop(0,currentSky.top); g.addColorStop(1,currentSky.bottom);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        
        // Yıldızlar
        stars.forEach(s=>{
          let alpha = 0.5 + Math.sin(performance.now()*0.002 + s.twinkle) * 0.5;
          ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill();
        });
      }

      function drawMountains() {
        for(let i=0; i<mountains.length; i++) {
          ctx.fillStyle = i === 0 ? currentSky.m1 : (i === 1 ? currentSky.m2 : '#020617');
          ctx.beginPath();
          ctx.moveTo(mountains[i][0].x, H);
          for(let j=0; j<mountains[i].length; j++) {
            let next = mountains[i][j+1];
            if(next) {
              let cx = (mountains[i][j].x + next.x) / 2;
              let cy = (mountains[i][j].y + next.y) / 2;
              ctx.quadraticCurveTo(mountains[i][j].x, mountains[i][j].y, cx, cy);
            } else {
              ctx.lineTo(mountains[i][j].x, mountains[i][j].y);
            }
          }
          ctx.lineTo(W+200*scale, H);
          ctx.lineTo(0, H);
          ctx.fill();
        }
      }
      
      function drawBgClouds() {
        bgClouds.forEach(c=>{
          ctx.fillStyle=`rgba(255,255,255,${c.opacity})`;
          ctx.beginPath(); ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
          ctx.arc(c.x+c.size*0.6,c.y-c.size*0.3,c.size*0.8,0,Math.PI*2);
          ctx.arc(c.x-c.size*0.5,c.y+c.size*0.2,c.size*0.7,0,Math.PI*2);
          ctx.fill();
        });
      }
      
      function drawChimneys() {
        chimneys.forEach(c=>{
          let x=c.x, yBase=H-c.height, w=c.width;
          let grad=ctx.createLinearGradient(x, 0, x+w, 0);
          grad.addColorStop(0, `hsl(${c.hue}, 40%, 30%)`);
          grad.addColorStop(0.3, `hsl(${c.hue}, 50%, 45%)`);
          grad.addColorStop(0.8, `hsl(${c.hue}, 30%, 20%)`);
          grad.addColorStop(1, `hsl(${c.hue}, 20%, 10%)`);
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(x - w*0.15, H);
          ctx.quadraticCurveTo(x + w*0.1, yBase + c.height*0.5, x + w*0.25, yBase);
          ctx.lineTo(x + w*0.75, yBase);
          ctx.quadraticCurveTo(x + w*0.9, yBase + c.height*0.5, x + w*1.15, H);
          ctx.fill();
          ctx.strokeStyle = `rgba(0,0,0,0.2)`;
          ctx.lineWidth = 2*scale;
          for(let k=1; k<5; k++) {
            let ly = H - c.height*(k/5);
            ctx.beginPath();
            ctx.moveTo(x + w*0.1, ly);
            ctx.quadraticCurveTo(x + w*0.5, ly + 15*scale, x + w*0.9, ly);
            ctx.stroke();
          }
          let capGrad = ctx.createRadialGradient(x+w*0.5, yBase-10*scale, 0, x+w*0.5, yBase, w);
          capGrad.addColorStop(0, `hsl(${c.hue-20}, 30%, 20%)`);
          capGrad.addColorStop(1, `hsl(${c.hue-30}, 20%, 8%)`);
          ctx.fillStyle = capGrad;
          ctx.beginPath();
          ctx.moveTo(x - w*0.1, yBase);
          ctx.quadraticCurveTo(x + w*0.5, yBase - w*0.8, x + w*1.1, yBase);
          ctx.quadraticCurveTo(x + w*0.5, yBase + w*0.3, x - w*0.1, yBase);
          ctx.fill();
        });
      }
      
      function drawBirds() {
        birds.forEach(b=>{
          ctx.save(); ctx.translate(b.x,b.y);
          let wingY = Math.sin(performance.now()*0.02 + b.wingOffset) * b.size * 1.2;
          ctx.fillStyle='#cbd5e1';
          ctx.beginPath(); ctx.ellipse(0, 0, b.size, b.size*0.35, -0.1, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.moveTo(-b.size*0.8, 0); ctx.lineTo(-b.size*1.3, b.size*0.1); ctx.lineTo(-b.size*0.8, b.size*0.2); ctx.fill();
          ctx.beginPath(); ctx.moveTo(b.size*0.8, 0); ctx.lineTo(b.size*1.5, -b.size*0.3); ctx.lineTo(b.size*1.4, b.size*0.3); ctx.fill();
          ctx.beginPath(); ctx.moveTo(-b.size*0.3, -b.size*0.1); ctx.quadraticCurveTo(b.size*0.2, wingY - b.size, b.size*0.8, wingY); ctx.lineTo(b.size*0.2, wingY*0.5); ctx.fill();
          ctx.restore();
        });
      }
      
      function drawStormClouds() {
        stormClouds.forEach(s=>{
          let grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
          grad.addColorStop(0, '#1e293b');
          grad.addColorStop(1, '#020617');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(s.x+s.radius*0.5, s.y-s.radius*0.4, s.radius*0.7, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(s.x-s.radius*0.4, s.y-s.radius*0.2, s.radius*0.8, 0, Math.PI*2); ctx.fill();
          if(s.lightningPhase % 70 < 8) {
            ctx.strokeStyle='#a78bfa';
            ctx.lineWidth=3*scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            let lx = s.x; let ly = s.y;
            ctx.moveTo(lx, ly);
            for(let i=0; i<4; i++) {
              lx += random(-20, 20)*scale;
              ly += random(20, 40)*scale;
              ctx.lineTo(lx, ly);
            }
            ctx.stroke();
            ctx.fillStyle = 'rgba(167, 139, 250, 0.1)';
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius*1.5, 0, Math.PI*2); ctx.fill();
          }
        });
      }
      
      function drawPlanes() {
        planes.forEach(p=>{
          ctx.save(); ctx.translate(p.x, p.y);
          let grad = ctx.createLinearGradient(0, -p.size, 0, p.size);
          grad.addColorStop(0, '#f8fafc'); grad.addColorStop(1, '#64748b');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.ellipse(0, 0, p.size*1.5, p.size*0.35, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#475569';
          ctx.beginPath(); ctx.moveTo(-p.size*0.2, p.size*0.2); ctx.lineTo(-p.size*0.8, p.size*1.2); ctx.lineTo(0, p.size*0.3); ctx.fill();
          ctx.fillStyle='#8b5cf6';
          ctx.beginPath(); ctx.moveTo(p.size*0.8, -p.size*0.2); ctx.lineTo(p.size*1.4, -p.size*1); ctx.lineTo(p.size*1.2, 0); ctx.fill();
          if(Math.floor(performance.now()/150)%2===0) {
            ctx.fillStyle='#3b82f6';
            ctx.beginPath(); ctx.arc(-p.size*1.2, 0, 4*scale, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 12; ctx.shadowColor = '#3b82f6'; ctx.fill(); ctx.shadowBlur = 0;
          }
          ctx.restore();
        });
      }
      
      function drawBalloon() {
        ctx.save(); ctx.translate(balloon.x, balloon.y);
        ctx.rotate(balloon.vy*0.025); 
        let r=balloon.radius;
        
        if(magnetActive) {
          ctx.beginPath(); ctx.arc(0,0,r*2.2,0,Math.PI*2);
          ctx.fillStyle='rgba(139, 92, 246, 0.1)'; ctx.fill();
          ctx.strokeStyle='rgba(167, 139, 250, 0.7)'; ctx.lineWidth=2*scale; ctx.stroke();
        }
        if(boostActive) {
          ctx.beginPath(); ctx.arc(0,0,r*1.8,0,Math.PI*2);
          ctx.strokeStyle='rgba(250, 204, 21, 0.5)'; ctx.lineWidth=2.5*scale; ctx.setLineDash([8*scale, 6*scale]); ctx.stroke(); ctx.setLineDash([]);
        }
        
        let basketW = r * 0.6;   
        let basketH = r * 0.3;  
        let basketY = r * 1.25;
        
        ctx.strokeStyle='#94a3b8'; ctx.lineWidth=1.5*scale;
        ctx.beginPath(); 
        ctx.moveTo(-r*0.4, r*0.7); ctx.lineTo(-basketW*0.4, basketY);
        ctx.moveTo(r*0.4, r*0.7); ctx.lineTo(basketW*0.4, basketY);
        ctx.stroke();

        if(pressing && fuel > 0) {
          let flameColor = boostActive ? '#facc15' : '#10b981';
          ctx.fillStyle = flameColor;
          ctx.beginPath();
          ctx.moveTo(-r*0.15, basketY);
          ctx.lineTo(r*0.15, basketY);
          ctx.lineTo(0, r*0.5 + Math.random()*r*0.5); 
          ctx.fill();
          ctx.fillStyle = '#fbbf24';
          ctx.beginPath();
          ctx.moveTo(-r*0.08, basketY);
          ctx.lineTo(r*0.08, basketY);
          ctx.lineTo(0, r*0.7 + Math.random()*r*0.3);
          ctx.fill();
        }
        
        let bGrad = ctx.createLinearGradient(-basketW/2, 0, basketW/2, 0);
        bGrad.addColorStop(0, '#1e3a8a'); 
        bGrad.addColorStop(1, '#312e81');
        ctx.fillStyle = bGrad;
        ctx.fillRect(-basketW/2, basketY, basketW, basketH);
        ctx.fillStyle='#3b82f6';
        ctx.fillRect(-basketW/2 - 2*scale, basketY, basketW + 4*scale, basketH*0.25);
        
        ctx.save();
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
        let colors=['#3b82f6','#8b5cf6','#ec4899','#06b6d4'];
        let sw=r*2.2/4;
        for(let i=0;i<4;i++){ 
          let sliceGrad = ctx.createLinearGradient(-r*1.1+i*sw, -r, -r*1.1+(i+1)*sw, r);
          sliceGrad.addColorStop(0, colors[i]);
          sliceGrad.addColorStop(1, '#0f172a');
          ctx.fillStyle = sliceGrad; 
          ctx.fillRect(-r*1.1+i*sw, -r*1.2, sw, r*2.4); 
        }
        let shadow=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1, 0,0,r);
        shadow.addColorStop(0,'rgba(255,255,255,0.4)'); 
        shadow.addColorStop(0.6,'rgba(0,0,0,0)');
        shadow.addColorStop(1,'rgba(0,0,0,0.7)'); 
        ctx.fillStyle=shadow; ctx.fillRect(-r*2,-r*2,r*4,r*4);
        ctx.restore();
        
        if(shieldActive) {
          ctx.beginPath(); ctx.arc(0,0,r*1.6,0,Math.PI*2);
          ctx.fillStyle='rgba(59, 130, 246, 0.15)'; ctx.fill();
          ctx.strokeStyle='#60a5fa'; ctx.lineWidth=3*scale; ctx.stroke();
        }
        ctx.restore();
      }
      
      function drawCollectibles() {
        collectibles.forEach(c=>{
          let bob=Math.sin(performance.now()*0.01+c.bobPhase)*5*scale;
          ctx.save(); ctx.translate(c.x, c.y+bob);
          ctx.shadowBlur = 18;
          if(c.type==='fuel') {
            ctx.shadowColor = '#10b981'; ctx.fillStyle='#059669'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#34d399'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('🔥',0,4*scale);
          } else if(c.type==='shield') {
            ctx.shadowColor = '#3b82f6'; ctx.fillStyle='#1d4ed8'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#93c5fd'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('🛡️',0,4*scale);
          } else if(c.type==='magnet') {
            ctx.shadowColor = '#a855f7'; ctx.fillStyle='#7e22ce'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#c084fc'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('🧲',0,4*scale);
          } else if(c.type==='boost') {
            ctx.shadowColor = '#facc15'; ctx.fillStyle='#a16207'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fde047'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('⚡',0,4*scale);
          }
          ctx.restore();
        });
      }
      
      function drawParticles() {
        ctx.globalCompositeOperation = 'lighter'; 
        particles.forEach(p=>{
          ctx.globalAlpha=Math.max(0, p.life);
          ctx.fillStyle=p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha=1;
        ctx.globalCompositeOperation = 'source-over';
      }
      
      function drawFloatingTexts() {
        floatingTexts.forEach(t=>{
          ctx.globalAlpha=Math.max(0, t.life);
          ctx.fillStyle=t.color;
          ctx.font=`800 ${18*scale}px Inter`;
          ctx.textAlign='center';
          ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(0,0,0,0.9)';
          ctx.fillText(t.text, t.x, t.y);
          ctx.shadowBlur = 0;
        });
        ctx.globalAlpha=1;
      }
      
      function render() {
        ctx.save();
        if (screenShake > 0.5) {
          let shakeX = (Math.random() - 0.5) * screenShake;
          let shakeY = (Math.random() - 0.5) * screenShake;
          ctx.translate(shakeX, shakeY);
        }
        drawSky();
        drawMountains();
        drawBgClouds();
        drawChimneys();
        drawStormClouds();
        drawPlanes();
        drawCollectibles();
        drawBirds(); 
        if(gameState !== STATE.MENU && gameState !== STATE.CRASHING) drawBalloon();
        drawParticles();
        drawFloatingTexts();
        ctx.restore();
      }
      
      function gameLoop() {
        if (gameState === STATE.PLAYING || gameState === STATE.CRASHING) {
          if(gameState === STATE.PLAYING) spawnObjects();
          updateGame();
        } else {
          updateGame();
        }
        render();
        requestAnimationFrame(gameLoop);
      }
      
      function startGame() {
        initAudio();
        sfxClick();
        fullReset();
        gameState = STATE.PLAYING;
        menuScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        hudContainer.style.opacity = '1';
        updateUI();
      }
      
      function endGame() {
        if (gameState === STATE.CRASHING || gameState === STATE.OVER) return;
        gameState = STATE.CRASHING; 
        hudContainer.style.opacity = '0';
        
        let isNewHigh = false;
        if (distance > highScore) {
          highScore = Math.floor(distance);
          try { localStorage.setItem('deepseek_sky_odyssey_high', highScore); } catch(e) {}
          isNewHigh = true;
          updateHighScoreUI();
        }

        setTimeout(() => {
          gameState = STATE.OVER;
          finalDistText.textContent = Math.floor(distance) + ' m';
          if (isNewHigh) {
            newHighScoreBadge.style.display = 'block';
          } else {
            newHighScoreBadge.style.display = 'none';
          }
          gameOverScreen.style.display = 'flex';
          gsap.fromTo(gameOverScreen.querySelector('.glass-panel'), 
            { scale: 0.8, opacity: 0, y: 50 }, 
            { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }
          );
        }, 800); 
      }
      
      function restartGame() {
        sfxClick();
        gameOverScreen.style.display = 'none';
        startGame();
      }

      function goToMenu() {
        sfxClick();
        gameState = STATE.MENU;
        gameOverScreen.style.display = 'none';
        hudContainer.style.opacity = '0';
        menuScreen.style.display = 'flex';
        updateHighScoreUI();
        fullReset();
      }
      
      canvas.addEventListener('touchstart', (e) => { 
        if(e.target.tagName !== 'BUTTON') e.preventDefault(); 
        if(gameState===STATE.PLAYING) { pressing = true; initAudio(); }
      }, {passive: false});
      canvas.addEventListener('touchend', (e) => { 
        if(e.target.tagName !== 'BUTTON') e.preventDefault(); 
        pressing = false; 
      }, {passive: false});
      canvas.addEventListener('mousedown', (e) => { 
        if(gameState===STATE.PLAYING && e.target.tagName !== 'BUTTON') { pressing = true; initAudio(); }
      });
      canvas.addEventListener('mouseup', () => pressing = false);
      
      document.getElementById('startBtn').addEventListener('click', startGame);
      document.getElementById('retryBtn').addEventListener('click', restartGame);
      document.getElementById('menuBtn').addEventListener('click', goToMenu);
      
      fullReset();
      gameLoop();
    })();
  </script>
</body>
</html>
