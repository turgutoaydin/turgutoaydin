<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonsuz Gökyüzü Balonu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            margin: 0 auto;
        }
        #score {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.7);
            z-index: 100;
            pointer-events: none;
        }
        #startScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.65);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
            text-align: center;
        }
        button {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 26px;
            background: linear-gradient(#ff9800, #f57c00);
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            cursor: pointer;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="score">0 m</div>

<div id="startScreen">
    <h1>🌤️ Sonsuz Gökyüzü</h1>
    <p>Balonu yukarıda tut,<br>kuşlara ve türbinlere çarpma!</p>
    <button onclick="startGame()">UÇUŞA GEÇ</button>
</div>

<canvas id="game"></canvas>

<script>
// Canvas
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// Oyun değişkenleri
let balloon = {
    x: W * 0.5,
    y: H * 0.65,
    radius: 32,
    vy: 0,
    gravity: 0.18,
    lift: -4.8
};

let score = 0;
let gameRunning = false;
let obstacles = [];
let clouds = [];
let mountains = [];
let lastObstacleTime = 0;

let isPressed = false;

// Kontroller
document.addEventListener('touchstart', e => { if(gameRunning) isPressed = true; });
document.addEventListener('touchend', () => { isPressed = false; });
document.addEventListener('mousedown', () => { if(gameRunning) isPressed = true; });
document.addEventListener('mouseup', () => { isPressed = false; });
document.addEventListener('keydown', e => { if(e.code === 'Space' && gameRunning) isPressed = true; });
document.addEventListener('keyup', e => { if(e.code === 'Space') isPressed = false; });

// Arka plan katmanları
for (let i = 0; i < 6; i++) {
    clouds.push({
        x: Math.random() * W * 1.5,
        y: 80 + Math.random() * (H * 0.5),
        size: 60 + Math.random() * 80,
        speed: 0.4 + i * 0.15,
        layer: i
    });
}

for (let i = 0; i < 4; i++) {
    mountains.push({
        x: i * (W / 3),
        height: 180 + Math.random() * 120,
        speed: 0.8
    });
}

function createObstacle() {
    const gap = 260;
    const minH = 120;
    const topH = minH + Math.random() * (H - gap - minH * 2);
    
    obstacles.push({
        x: W + 50,
        top: topH,
        width: 85,
        passed: false,
        type: Math.random() > 0.5 ? 'turbine' : 'birds'  // iki çeşit engel
    });
}

function drawBackground() {
    // Gökyüzü gradient (yükseldikçe değişir)
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    const intensity = Math.min(score / 800, 1);
    skyGrad.addColorStop(0, `rgb(80, 140, ${255 - intensity*80})`);
    skyGrad.addColorStop(1, `rgb(200, 230, ${255 - intensity*40})`);
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Uzak dağlar
    ctx.fillStyle = '#5C7A96';
    for (let m of mountains) {
        ctx.beginPath();
        ctx.moveTo(m.x - 100, H);
        ctx.lineTo(m.x + W/4, H - m.height);
        ctx.lineTo(m.x + W/2, H);
        ctx.fill();
    }

    // Bulutlar (parallax)
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    for (let c of clouds) {
        const scale = 0.6 + c.layer * 0.1;
        ctx.globalAlpha = 0.7 + c.layer * 0.05;
        ctx.beginPath();
        ctx.ellipse(c.x, c.y, c.size * scale, c.size * scale * 0.55, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(c.x - c.size*0.45*scale, c.y - 15*scale, c.size*0.75*scale, c.size*0.5*scale, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

function drawBalloon() {
    ctx.save();
    ctx.translate(balloon.x, balloon.y);

    // Balon gölgesi
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(12, 12, balloon.radius*1.05, balloon.radius*1.2, 0, 0, Math.PI*2);
    ctx.fill();

    // Balon gövdesi (renkli gradient)
    const grad = ctx.createLinearGradient(0, -balloon.radius*1.2, 0, balloon.radius*0.8);
    grad.addColorStop(0, '#FF6D00');
    grad.addColorStop(0.5, '#FF9800');
    grad.addColorStop(1, '#FFB300');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, balloon.radius, balloon.radius * 1.22, 0, 0, Math.PI*2);
    ctx.fill();

    // Balon çizgileri (gerçekçi görünüm)
    ctx.strokeStyle = '#E65100';
    ctx.lineWidth = 4;
    for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(i*12, -balloon.radius*1.05);
        ctx.quadraticCurveTo(i*25, -20, i*8, balloon.radius*0.9);
        ctx.stroke();
    }

    // Parlaklık efekti
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(-11, -18, 13, 22, Math.PI/6, 0, Math.PI*2);
    ctx.fill();

    // İpler
    ctx.strokeStyle = '#263238';
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(0, balloon.radius * 0.95);
    ctx.lineTo(0, balloon.radius + 42);
    ctx.stroke();

    // Sepet
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(-14, balloon.radius + 40, 28, 22);
    ctx.strokeStyle = '#3E2723';
    ctx.lineWidth = 3;
    ctx.strokeRect(-14, balloon.radius + 40, 28, 22);

    ctx.restore();
}

function drawObstacles() {
    for (let obs of obstacles) {
        if (obs.type === 'turbine') {
            // Rüzgar türbini
            ctx.fillStyle = '#455A64';
            ctx.fillRect(obs.x + 20, obs.top - 40, 45, 40); // üst kısım
            ctx.fillRect(obs.x + 28, obs.top, 30, H);     // direk
            
            // Pervaneler (basit animasyon)
            const angle = Date.now() / 200;
            ctx.strokeStyle = '#263238';
            ctx.lineWidth = 8;
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(obs.x + 42, obs.top - 20);
                ctx.lineTo(obs.x + 42 + Math.cos(angle + i*2.1)*38, 
                          obs.top - 20 + Math.sin(angle + i*2.1)*38);
                ctx.stroke();
            }
        } else {
            // Kuş sürüsü (birkaç kuş)
            ctx.fillStyle = '#263238';
            for (let i = 0; i < 5; i++) {
                const ky = obs.top - 60 + i*28 + Math.sin(Date.now()/300 + i)*12;
                ctx.beginPath();
                ctx.ellipse(obs.x + 30 + i*12, ky, 18, 9, 0.3, 0, Math.PI*2);
                ctx.fill();
                // kanat
                ctx.fillRect(obs.x + 25 + i*12, ky - 8, 14, 6);
            }
        }
    }
}

function update() {
    if (!gameRunning) return;

    // Fizik
    balloon.vy += balloon.gravity;
    if (isPressed) balloon.vy = balloon.lift;
    balloon.y += balloon.vy;

    // Sınırlar
    if (balloon.y < balloon.radius * 1.3) {
        balloon.y = balloon.radius * 1.3;
        balloon.vy = 0.5;
    }
    if (balloon.y > H - 80) gameOver();

    // Engel üretimi
    if (Date.now() - lastObstacleTime > 1350) {
        createObstacle();
        lastObstacleTime = Date.now();
    }

    // Engelleri hareket ettir ve kontrol et
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= 3.4;

        if (!o.passed && o.x + o.width < balloon.x - 20) {
            o.passed = true;
            score += 15;
            document.getElementById('score').textContent = Math.floor(score) + " m";
        }

        // Çarpışma
        const bx = balloon.x;
        const by = balloon.y;
        if (bx + balloon.radius > o.x && bx - balloon.radius < o.x + o.width) {
            if (by - balloon.radius < o.top || by + balloon.radius + 65 > o.top + 260) {
                gameOver();
            }
        }

        if (o.x < -150) obstacles.splice(i, 1);
    }

    // Arka plan hareketi
    for (let c of clouds) c.x -= c.speed;
    for (let m of mountains) m.x -= m.speed * 0.6;

    // Sonsuz döngü
    if (clouds[0].x < -300) clouds.push(clouds.shift());
    if (mountains[0].x < -W/2) mountains.push(mountains.shift());
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawObstacles();
    drawBalloon();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameRunning = false;
    setTimeout(() => {
        alert(`🎈 Uçuş bitti!\n\nYüksekliğin: ${Math.floor(score)} metre\n\nTekrar denemek için sayfayı yenile.`);
    }, 100);
}

function startGame() {
    document.getElementById('startScreen').style.display = 'none';
    
    balloon.y = H * 0.65;
    balloon.vy = -2;
    obstacles = [];
    score = 0;
    document.getElementById('score').textContent = "0 m";
    gameRunning = true;
    lastObstacleTime = Date.now() - 1000;
}

gameLoop();
</script>

</body>
</html>
