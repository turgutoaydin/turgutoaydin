<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mardin Koşusu | Taş Sokaklar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: #2a2418;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Poppins', -apple-system, sans-serif;
            padding: 12px;
        }

        .game-wrapper {
            background: #e2caa4;
            border-radius: 42px;
            padding: 12px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            width: 100%;
            height: auto;
            cursor: pointer;
            touch-action: none;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 0 10px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-card {
            background: #2f241b;
            padding: 6px 18px;
            border-radius: 50px;
            color: #ffe6b3;
            font-weight: bold;
            font-size: 1.35rem;
            font-family: monospace;
            letter-spacing: 1px;
            box-shadow: inset 0 1px 3px #00000033, 0 4px 8px rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
        }

        .best-card {
            background: #5c3f28;
            padding: 6px 18px;
            border-radius: 50px;
            color: #ffefcf;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .restart-mobile {
            background: #c68e5a;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 26px;
            border-radius: 60px;
            color: #2c1e12;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 4px 0 #6f4a2a;
            touch-action: manipulation;
        }

        .restart-mobile:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #6f4a2a;
        }

        .jump-hint {
            background: #5e3f28aa;
            backdrop-filter: blur(8px);
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #fff0cf;
            text-align: center;
            font-weight: 500;
            display: inline-block;
            width: auto;
        }

        .footer-control {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .score-card { font-size: 1rem; padding: 4px 14px; }
            .best-card { font-size: 0.85rem; padding: 4px 14px; }
            .restart-mobile { padding: 6px 20px; font-size: 0.85rem; }
            .jump-hint { font-size: 0.65rem; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="750" height="420" style="width:100%; height:auto; max-width:750px; aspect-ratio:750/420"></canvas>
        <div class="info-bar">
            <div class="score-card">🏃‍♂️ <span id="scoreValue">0</span></div>
            <div class="best-card">🏅 REKOR <span id="bestValue">0</span></div>
            <button class="restart-mobile" id="restartButton">🔄 YENİDEN</button>
        </div>
        <div class="footer-control">
            <div class="jump-hint">
                👆 EKRANA DOKUN / TIKLA → ZIPLA  |  Mardin Taş Arası Koşu
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // ---------- canvas ve mobil uyum ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Sabit oran: 750x420 (mobilde rahat)
        const W = 750;
        const H = 420;
        canvas.width = W;
        canvas.height = H;
        
        // ---------- Oyun değişkenleri ----------
        let gameRunning = true;
        let score = 0;
        let bestScore = localStorage.getItem('mardinBestMob') ? parseInt(localStorage.getItem('mardinBestMob')) : 0;
        let frame = 0;
        let groundY = H - 58;   // zemin seviyesi (taş yol)
        
        // KARAKTER (Mardinli koşucu)
        const PLAYER_W = 26;
        const PLAYER_H = 30;
        let playerX = 90;
        let playerY = groundY - PLAYER_H;
        let playerVy = 0;
        let isOnGround = true;
        const GRAVITY = 0.68;
        const JUMP_POWER = -9.6;
        
        // Engeller (taş süsler / dar çıkmalar)
        let obstacles = [];
        const OBSTACLE_W = 20;
        const OBSTACLE_H_MIN = 26;
        const OBSTACLE_H_MAX = 48;
        let spawnGap = 70;
        let lastSpawnFrame = 0;
        
        // görsel animasyon
        let bgOffset = 0;
        
        // UI elementler
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        bestSpan.innerText = bestScore;
        
        function updateUI() {
            scoreSpan.innerText = Math.floor(score);
            if(score > bestScore) {
                bestScore = Math.floor(score);
                bestSpan.innerText = bestScore;
                localStorage.setItem('mardinBestMob', bestScore);
            }
        }
        
        // Zıplama (mobil / dokunma için özel)
        function jump() {
            if(!gameRunning) return;
            if(isOnGround) {
                playerVy = JUMP_POWER;
                isOnGround = false;
                // hafif dokunsal geri bildirim (vibrasyon - isteğe bağlı sessiz)
                if(navigator.vibrate) navigator.vibrate(20);
            }
        }
        
        // Fizik
        function updatePhysics() {
            if(!gameRunning) return;
            playerVy += GRAVITY;
            playerY += playerVy;
            
            if(playerY + PLAYER_H >= groundY) {
                playerY = groundY - PLAYER_H;
                playerVy = 0;
                isOnGround = true;
            }
            if(playerY < 0) {
                playerY = 0;
                if(playerVy < 0) playerVy = 0;
            }
        }
        
        // Engel üret
        function trySpawnObstacle(currentFrame) {
            if(!gameRunning) return;
            if(currentFrame - lastSpawnFrame >= spawnGap) {
                let height = Math.floor(Math.random() * (OBSTACLE_H_MAX - OBSTACLE_H_MIN + 1) + OBSTACLE_H_MIN);
                obstacles.push({
                    x: W,
                    y: groundY - height,
                    width: OBSTACLE_W,
                    height: height,
                    passed: false
                });
                lastSpawnFrame = currentFrame;
                // skora göre hafif hızlanma ama çok agresif değil
                let newGap = Math.max(44, 70 - Math.floor(score / 150));
                spawnGap = newGap;
            }
        }
        
        // Engel güncelle + çarpışma
        function updateObstacles() {
            if(!gameRunning) return;
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].x -= 3.9;   // akıcı mobil koşu
            }
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            
            // skor artırma
            for(let i=0; i<obstacles.length; i++) {
                const obs = obstacles[i];
                if(!obs.passed && obs.x + obs.width < playerX) {
                    obs.passed = true;
                    score += 1;
                    updateUI();
                }
            }
            
            const playerRect = { x: playerX, y: playerY, w: PLAYER_W, h: PLAYER_H };
            for(let obs of obstacles) {
                const obsRect = { x: obs.x, y: obs.y, w: obs.width, h: obs.height };
                if(playerRect.x < obsRect.x + obsRect.w &&
                   playerRect.x + playerRect.w > obsRect.x &&
                   playerRect.y < obsRect.y + obsRect.h &&
                   playerRect.y + playerRect.h > obsRect.y) {
                    gameRunning = false;
                    if(navigator.vibrate) navigator.vibrate(100);
                    break;
                }
            }
        }
        
        // ----- GÖRSEL: Mardin atmosferi (mobilde net) -----
        function drawBackground() {
            // Gökyüzü soft Mardin tonu
            const gradSky = ctx.createLinearGradient(0, 0, 0, H*0.65);
            gradSky.addColorStop(0, '#faeac2');
            gradSky.addColorStop(1, '#e2be8c');
            ctx.fillStyle = gradSky;
            ctx.fillRect(0, 0, W, H);
            
            // Uzak tepeler / Mezopotamya ovası
            ctx.fillStyle = '#b28354';
            ctx.beginPath();
            ctx.moveTo(0, H-112);
            for(let i=0; i<14; i++) {
                ctx.lineTo(i*65, H-122 + Math.sin(i*0.5)*8);
            }
            ctx.lineTo(W, H-112);
            ctx.lineTo(W, groundY-6);
            ctx.lineTo(0, groundY-6);
            ctx.fill();
            
            // Zemin (taş sokak)
            ctx.fillStyle = '#8f673f';
            ctx.fillRect(0, groundY-6, W, 64);
            ctx.fillStyle = '#c19765';
            for(let i=0;i<60;i++) {
                ctx.beginPath();
                ctx.arc( (i*41 + bgOffset*0.9)%W, groundY-3 + Math.sin(i)*3, 2.2, 0, Math.PI*2);
                ctx.fill();
            }
            
            // Mardin evleri (silüet)
            ctx.fillStyle = '#b8814b';
            for(let i=0; i<12; i++) {
                let baseX = (i*82 + bgOffset*0.2) % (W+120) - 60;
                if(baseX > -40 && baseX < W+40) {
                    ctx.fillRect(baseX, H-128, 30, 44);
                    ctx.fillStyle = '#9c6942';
                    ctx.fillRect(baseX+5, H-138, 20, 14);
                    ctx.fillStyle = '#f7d99e';
                    ctx.fillRect(baseX+12, H-133, 7, 7);
                    ctx.fillStyle = '#b8814b';
                }
            }
            // yol çizgileri (taş desen)
            ctx.beginPath();
            ctx.strokeStyle = '#efdfb7';
            ctx.lineWidth = 1.8;
            for(let i=0;i<18;i++) {
                let lx = (i*52 + bgOffset*1.5) % W;
                ctx.beginPath();
                ctx.moveTo(lx, groundY-4);
                ctx.lineTo(lx+22, groundY-10);
                ctx.stroke();
            }
        }
        
        // Mardinli Koşucu (karakter detayı)
        function drawPlayer() {
            ctx.shadowBlur = 4;
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            // elbise
            ctx.fillStyle = '#4f321c';
            ctx.fillRect(playerX+4, playerY+6, PLAYER_W-8, PLAYER_H-10);
            ctx.fillStyle = '#cc9f6b';
            ctx.fillRect(playerX+2, playerY+2, PLAYER_W-4, 12);
            // başlık / puşi
            ctx.fillStyle = '#b57542';
            ctx.beginPath();
            ctx.ellipse(playerX+PLAYER_W/2, playerY-2, 11, 9, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#fceabd';
            ctx.beginPath();
            ctx.arc(playerX+PLAYER_W/2, playerY+5, 8.5, 0, Math.PI*2);
            ctx.fill();
            // göz
            ctx.fillStyle = '#3c2a19';
            ctx.beginPath();
            ctx.arc(playerX+PLAYER_W*0.35, playerY+3, 1.8, 0, Math.PI*2);
            ctx.arc(playerX+PLAYER_W*0.65, playerY+3, 1.8, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#e1a56b';
            ctx.beginPath();
            ctx.ellipse(playerX+PLAYER_W/2, playerY+8, 4.5, 3, 0, 0, Math.PI*2);
            ctx.fill();
            // bıyık ince
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#472f1c';
            ctx.moveTo(playerX+7, playerY+9);
            ctx.lineTo(playerX+11, playerY+11);
            ctx.moveTo(playerX+PLAYER_W-7, playerY+9);
            ctx.lineTo(playerX+PLAYER_W-11, playerY+11);
            ctx.stroke();
            // koşu animasyonu
            let stepAnim = (frame % 18 < 9) ? 3 : -2;
            ctx.fillStyle = '#684f30';
            ctx.fillRect(playerX+5, playerY+PLAYER_H-7, 5, 8);
            ctx.fillRect(playerX+PLAYER_W-10, playerY+PLAYER_H-7+stepAnim*0.6, 5, 8);
            ctx.shadowBlur = 0;
        }
        
        // engeller (Mardin taş işleme)
        function drawObstacles() {
            for(let obs of obstacles) {
                ctx.fillStyle = '#a16e3e';
                ctx.shadowBlur = 2;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = '#ddb582';
                for(let i=0;i<3;i++) {
                    ctx.fillRect(obs.x+3, obs.y+obs.height-12 - i*9, obs.width-6, 3);
                }
                ctx.fillStyle = '#f3e1b3';
                ctx.fillRect(obs.x+4, obs.y+7, obs.width-8, 10);
                ctx.fillStyle = '#7c5a38';
                ctx.fillRect(obs.x+6, obs.y+9, 3, 6);
                ctx.fillRect(obs.x+obs.width-9, obs.y+9, 3, 6);
            }
            ctx.shadowBlur = 0;
        }
        
        // Game Over ekranı (mobil dokunma dostu)
        function drawGameOver() {
            if(!gameRunning) {
                ctx.fillStyle = 'rgba(25, 18, 11, 0.85)';
                ctx.fillRect(0, 0, W, H);
                ctx.font = 'bold 32px system-ui, "Segoe UI"';
                ctx.fillStyle = '#ffecb3';
                ctx.shadowBlur = 0;
                ctx.fillText("🏁 KOŞU BİTTİ", W/2-125, H/2-45);
                ctx.font = '20px monospace';
                ctx.fillStyle = '#fde3a5';
                ctx.fillText(`Skorun: ${Math.floor(score)}`, W/2-70, H/2+20);
                ctx.font = '14px system-ui';
                ctx.fillStyle = '#e7cca2';
                ctx.fillText("Mardin sokaklarında tekrar dene", W/2-120, H/2+78);
            }
        }
        
        // döngü
        let animFrame;
        function gameLoop() {
            if(gameRunning) {
                frame++;
                bgOffset = (bgOffset + 0.7) % 360;
                updatePhysics();
                trySpawnObstacle(frame);
                updateObstacles();
            }
            drawBackground();
            drawObstacles();
            drawPlayer();
            drawGameOver();
            animFrame = requestAnimationFrame(gameLoop);
        }
        
        // Oyun resetleme
        function restartGame() {
            gameRunning = true;
            score = 0;
            updateUI();
            obstacles = [];
            playerY = groundY - PLAYER_H;
            playerVy = 0;
            isOnGround = true;
            frame = 0;
            lastSpawnFrame = 0;
            spawnGap = 70;
        }
        
        // ---------- MOBİL DOKUNMA & KLavye ----------
        function attachMobileEvents() {
            // dokunmatik olaylar (canvas'a)
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                jump();
            });
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                jump();
            });
            // klavye desteği
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space' || e.code === 'ArrowUp') {
                    e.preventDefault();
                    jump();
                }
                if(e.code === 'KeyR') {
                    e.preventDefault();
                    restartGame();
                }
            });
            // buton yeniden başlat
            const restartBtn = document.getElementById('restartButton');
            restartBtn.addEventListener('click', (e) => {
                e.preventDefault();
                restartGame();
            });
            restartBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                restartGame();
            });
        }
        
        // başlangıç
        bestSpan.innerText = bestScore;
        updateUI();
        restartGame(); // başlangıç hazır
        attachMobileEvents();
        gameLoop();
    })();
</script>
</body>
</html>
