<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Balon Kulesi</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
      font-family: Arial, sans-serif;
      touch-action: manipulation;
    }
    #game {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #balloon {
      position: absolute;
      left: 50%;
      width: 70px;
      height: 90px;
      transform: translateX(-50%);
      background: radial-gradient(circle at 30% 30%, #ff6b6b, #c0392b);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
      transition: transform 0.1s;
    }
    #balloon::after {
      content: "";
      position: absolute;
      bottom: -40px;
      left: 50%;
      width: 4px;
      height: 40px;
      background: #8B4513;
      transform: translateX(-50%);
    }
    #basket {
      position: absolute;
      bottom: -45px;
      left: 50%;
      width: 60px;
      height: 30px;
      background: #8B4513;
      border-radius: 8px;
      transform: translateX(-50%);
      box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    }
    .platform {
      position: absolute;
      width: 120px;
      height: 18px;
      background: linear-gradient(#f4a261, #e76f51);
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .cloud {
      position: absolute;
      font-size: 60px;
      opacity: 0.7;
      pointer-events: none;
      user-select: none;
    }
    .bird {
      position: absolute;
      font-size: 40px;
      transition: transform 0.8s linear;
    }
    #score {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 32px;
      color: #fff;
      text-shadow: 2px 2px 4px #000;
      z-index: 10;
      pointer-events: none;
    }
    #gameover {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      z-index: 20;
      display: none;
    }
    button {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 24px;
      border: none;
      border-radius: 12px;
      background: #e74c3c;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="game">
  <div id="score">0 m</div>
  <div id="balloon">
    <div id="basket"></div>
  </div>
  <div id="gameover">
    <div>Balon Patladı!</div>
    <div id="finalscore">0 metre</div>
    <button onclick="location.reload()">Tekrar Oyna</button>
  </div>
</div>

<script>
// ================================
// OYUN DEĞİŞKENLERİ
// ================================
const balloon = document.getElementById('balloon');
const scoreEl = document.getElementById('score');
const gameoverEl = document.getElementById('gameover');
const finalscoreEl = document.getElementById('finalscore');

let posX = window.innerWidth / 2 - 35;
let posY = 300;
let velY = 0;
let gravity = 0.35;
let jumpPower = -9.5;
let gameSpeed = 2.2;
let score = 0;
let gameActive = true;

let platforms = [];
let birds = [];

// Mobil dokunma / fare desteği
let touchActive = false;

// ================================
// PLATFORM OLUŞTURMA
// ================================
function createPlatform(y) {
  const p = document.createElement('div');
  p.className = 'platform';
  
  let width = Math.random() * 80 + 90; // 90-170px
  let left = Math.random() * (window.innerWidth - width - 20) + 10;
  
  p.style.width = width + 'px';
  p.style.left = left + 'px';
  p.style.top = y + 'px';
  
  document.getElementById('game').appendChild(p);
  platforms.push({el: p, x: left, w: width, y});
}

// İlk platformlar
for(let i = 0; i < 8; i++) {
  createPlatform( window.innerHeight - i * 140 );
}

// ================================
// KUŞ (DÜŞMAN)
// ================================
function spawnBird() {
  if (!gameActive) return;
  if (Math.random() > 0.97) {   // nadir spawn
    const bird = document.createElement('div');
    bird.className = 'bird';
    bird.textContent = '🦅';
    
    const side = Math.random() > 0.5 ? 'left' : 'right';
    const startX = side === 'left' ? -60 : window.innerWidth + 20;
    const targetX = side === 'left' ? window.innerWidth + 80 : -80;
    
    bird.style.left = startX + 'px';
    bird.style.top = (100 + Math.random() * (window.innerHeight - 200)) + 'px';
    
    document.getElementById('game').appendChild(bird);
    birds.push({
      el: bird,
      x: side === 'left' ? -60 : window.innerWidth,
      vx: side === 'left' ? 3.2 : -3.2
    });
  }
}

// ================================
// Oyun Döngüsü
// ================================
function gameLoop() {
  if (!gameActive) return;

  // Yerçekimi + hız
  velY += gravity;
  posY += velY;

  // Yukarı kaydırma (kamerası yukarı gidiyor)
  if (posY < window.innerHeight * 0.35) {
    const moveUp = (window.innerHeight * 0.35 - posY) * 0.12;
    posY += moveUp;
    score += moveUp * 0.07;

    // Platformları aşağı kaydır
    platforms.forEach(p => {
      p.y += moveUp;
      p.el.style.top = p.y + 'px';
    });

    // Kuşları da aşağı kaydır
    birds.forEach(b => {
      b.el.style.top = (parseFloat(b.el.style.top) + moveUp) + 'px';
    });

    // Çok aşağı düşen platformları sil
    platforms = platforms.filter(p => {
      if (p.y > window.innerHeight + 50) {
        p.el.remove();
        return false;
      }
      return true;
    });

    // Yeni platform ekle
    if (platforms.length < 12 || platforms[platforms.length-1].y > 300) {
      const lastY = platforms.length ? platforms[platforms.length-1].y : window.innerHeight;
      createPlatform(lastY - (140 + Math.random()*60));
    }
  }

  // Balonu hareket ettir
  balloon.style.top = posY + 'px';
  balloon.style.left = posX + 'px';

  // Zemin kontrolü (oyun bitmez ama çok aşağı düşmesin)
  if (posY > window.innerHeight + 100) {
    velY = jumpPower * 0.6; // hafif sıçrama
  }

  // Çarpışma - platform
  let onPlatform = false;
  for (let p of platforms) {
    if (
      posX + 35 > p.x &&
      posX + 35 < p.x + p.w &&
      posY + 80 > p.y &&
      posY + 110 < p.y + 30 &&
      velY > 0
    ) {
      posY = p.y - 110;
      velY = jumpPower;
      onPlatform = true;
      break;
    }
  }

  // Çarpışma - kuş
  for (let b of birds) {
    const birdRect = b.el.getBoundingClientRect();
    const balRect = balloon.getBoundingClientRect();

    if (
      balRect.left < birdRect.right &&
      balRect.right > birdRect.left &&
      balRect.top < birdRect.bottom &&
      balRect.bottom > birdRect.top
    ) {
      gameActive = false;
      finalscoreEl.textContent = Math.floor(score) + " metre";
      gameoverEl.style.display = 'flex';
      break;
    }
  }

  // Kuş hareketi
  birds = birds.filter(b => {
    b.x += b.vx;
    b.el.style.left = b.x + 'px';

    // Ekstra kuş animasyonu (kanat çırpma hissi)
    b.el.style.transform = `scaleX(${Math.sin(Date.now()*0.015)*0.2 + 1})`;

    if (b.x < -100 || b.x > window.innerWidth + 100) {
      b.el.remove();
      return false;
    }
    return true;
  });

  // Skor güncelle
  scoreEl.textContent = Math.floor(score) + " m";

  // Zorluk artışı
  if (score > 300) gravity = 0.38;
  if (score > 800) gravity = 0.42;
  if (score > 1500) gameSpeed = 2.8;

  requestAnimationFrame(gameLoop);
}

// ================================
// Kontroller (hem fare hem dokunmatik)
// ================================
function jump() {
  if (!gameActive) return;
  velY = jumpPower;
  balloon.style.transform = 'translateX(-50%) scale(1.08)';
  setTimeout(() => balloon.style.transform = 'translateX(-50%) scale(1)', 80);
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

window.addEventListener('mousedown', e => {
  e.preventDefault();
  jump();
});

window.addEventListener('touchstart', e => {
  e.preventDefault();
  touchActive = true;
  jump();
});

window.addEventListener('touchend', () => {
  touchActive = false;
});

// Yanlara hareket (fare ile sürükleme / dokunmatik)
let lastTouchX = null;

window.addEventListener('mousemove', e => {
  if (!gameActive) return;
  posX = e.clientX;
});

window.addEventListener('touchmove', e => {
  if (!gameActive) return;
  e.preventDefault();
  const touch = e.touches[0];
  if (lastTouchX !== null) {
    const delta = touch.clientX - lastTouchX;
    posX += delta * 1.4;
  }
  lastTouchX = touch.clientX;
});

window.addEventListener('touchend', () => {
  lastTouchX = null;
});

// Oyun başlasın
gameLoop();
setInterval(spawnBird, 800);

</script>
</body>
</html>
