<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cappadocia Balloon Ultimate</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Arial, sans-serif;
}

canvas {
    display:block;
}

#ui {
    position:absolute;
    inset:0;
    pointer-events:none;
}

#score {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    color:#fff;
    font-weight:bold;
}

.screen {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.7);
    color:#fff;
    pointer-events:auto;
}

button {
    padding:15px 40px;
    font-size:22px;
    border:none;
    border-radius:30px;
    background:orange;
    color:white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
    <div id="score">0 m</div>

    <div id="menu" class="screen">
        <h1>🎈 Cappadocia</h1>
        <button onclick="startGame()">Start</button>
    </div>

    <div id="gameover" class="screen" style="display:none;">
        <h1>Game Over</h1>
        <p id="finalScore"></p>
        <button onclick="restart()">Retry</button>
    </div>
</div>

<script>

// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= STATE =================
const STATE = { MENU:0, PLAY:1, OVER:2 };
let gameState = STATE.MENU;

// ================= CAMERA =================
let camera = {
    y:0,
    target:0,
    smooth:0.08
};

// ================= WIND =================
let wind = {
    force:0,
    target:0,
    timer:0
};

// ================= PLAYER =================
let balloon = {
    x:0,
    y:0,
    vx:0,
    vy:0,
    gravity:0.25,
    lift:-0.7,
    drag:0.98
};

// ================= INPUT =================
let press=false;
window.addEventListener("touchstart",()=>press=true);
window.addEventListener("touchend",()=>press=false);
window.addEventListener("mousedown",()=>press=true);
window.addEventListener("mouseup",()=>press=false);

// ================= PARTICLES =================
let particles=[];
function spawnParticle(x,y){
    particles.push({
        x,y,
        vx:(Math.random()-0.5)*2,
        vy:-Math.random()*3,
        life:40
    });
}

// ================= RESET =================
function reset(){
    balloon.x = W/2;
    balloon.y = H/2;
    balloon.vx = 0;
    balloon.vy = 0;
    score = 0;
}

// ================= WIND =================
function updateWind(){
    wind.timer--;
    if(wind.timer<=0){
        wind.target = (Math.random()-0.5)*1.5;
        wind.timer = 200;
    }
    wind.force += (wind.target - wind.force)*0.02;
}

// ================= PLAYER =================
function updatePlayer(){

    if(press) balloon.vy += balloon.lift;

    balloon.vy += balloon.gravity;
    balloon.vx += wind.force*0.05;

    balloon.vx *= balloon.drag;
    balloon.vy *= balloon.drag;

    balloon.x += balloon.vx;
    balloon.y += balloon.vy;

    if(balloon.y > H) gameOver();

    if(Math.random()>0.6){
        spawnParticle(balloon.x, balloon.y+30);
    }
}

// ================= CAMERA =================
function updateCamera(){
    camera.target = balloon.y - H*0.4;
    camera.y += (camera.target - camera.y)*camera.smooth;
}

// ================= SKY =================
function drawSky(){
    let g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#FF8C42");
    g.addColorStop(1,"#87CEEB");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
}

// ================= TERRAIN =================
let layers = [
    {speed:0.2, color:"#FAD7A0"},
    {speed:0.4, color:"#E59866"},
    {speed:0.7, color:"#CA6F1E"},
    {speed:1.0, color:"#873600"}
];

function drawTerrain(){
    layers.forEach((l,i)=>{
        ctx.fillStyle = l.color;

        for(let x=-100; x<W+100; x+=80){
            let y = H - 120 - i*40 + Math.sin((x + camera.y*l.speed)*0.01)*40;

            ctx.beginPath();
            ctx.moveTo(x,y);
            ctx.lineTo(x+40,y-100);
            ctx.lineTo(x+80,y);
            ctx.fill();
        }
    });
}

// ================= BALLOON =================
function drawBalloon(){
    ctx.save();
    ctx.translate(balloon.x, balloon.y - camera.y);

    let tilt = balloon.vy * 0.05;
    ctx.rotate(tilt);

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(0,0,40,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#5D4037";
    ctx.fillRect(-10,40,20,15);

    ctx.restore();
}

// ================= PARTICLES =================
function drawParticles(){
    particles.forEach((p,i)=>{
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle="rgba(255,150,50,"+(p.life/40)+")";
        ctx.fillRect(p.x, p.y-camera.y, 4,4);

        if(p.life<=0) particles.splice(i,1);
    });
}

// ================= GAME LOOP =================
let score=0;

function update(){
    if(gameState!==STATE.PLAY) return;

    updateWind();
    updatePlayer();
    updateCamera();

    score += 0.1;
    document.getElementById("score").innerText = Math.floor(score)+" m";
}

function draw(){
    ctx.clearRect(0,0,W,H);

    drawSky();
    drawTerrain();
    drawParticles();
    drawBalloon();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

// ================= GAME CONTROL =================
function startGame(){
    reset();
    gameState = STATE.PLAY;
    document.getElementById("menu").style.display="none";
}

function gameOver(){
    gameState = STATE.OVER;
    document.getElementById("gameover").style.display="flex";
    document.getElementById("finalScore").innerText = "Score: "+Math.floor(score)+" m";
}

function restart(){
    document.getElementById("gameover").style.display="none";
    document.getElementById("menu").style.display="flex";
    gameState = STATE.MENU;
}

</script>

</body>
</html>
