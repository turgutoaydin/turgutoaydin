<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cappadocia Balloon</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial;}
canvas { display:block; }

#ui {
    position:absolute; inset:0;
    pointer-events:none;
}

#score {
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    color:#fff;
    font-size:28px;
    font-weight:bold;
}

.screen {
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(0,0,0,0.7);
    color:#fff;
    pointer-events:auto;
}

button {
    padding:15px 40px;
    font-size:20px;
    border:none;
    border-radius:25px;
    background:orange;
    color:#fff;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="ui">
    <div id="score">0 m</div>

    <div id="menu" class="screen">
        <h1>🎈 Kapadokya</h1>
        <button onclick="startGame()">Başla</button>
    </div>

    <div id="gameover" class="screen" style="display:none;">
        <h1>Çarpıştın</h1>
        <p id="finalScore"></p>
        <button onclick="restart()">Tekrar</button>
    </div>
</div>

<script>

// ================= CANVAS =================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W,H;
function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ================= STATE =================
const STATE = {MENU:0, PLAY:1, OVER:2};
let gameState = STATE.MENU;

// ================= PLAYER =================
let balloon = {
    x:0, // sabit olacak
    y:0,
    vy:0,
    gravity:0.25,
    lift:-0.7,
    drag:0.98
};

// ================= WIND =================
let wind = {
    force:0
};

// ================= INPUT =================
let press=false;
window.addEventListener("touchstart",()=>press=true);
window.addEventListener("touchend",()=>press=false);
window.addEventListener("mousedown",()=>press=true);
window.addEventListener("mouseup",()=>press=false);

// ================= OBSTACLES =================
let chimneys = [];
let birds = [];

function spawnChimney(){
    chimneys.push({
        x: W + 100,
        width: 80,
        height: 120 + Math.random()*180
    });
}

function spawnBird(){
    birds.push({
        x: W + 50,
        y: 50 + Math.random()*200,
        size: 25,
        speed: 2 + Math.random()*2
    });
}

// ================= RESET =================
let score=0;
function reset(){
    balloon.x = W * 0.3; // SABİT POZİSYON
    balloon.y = H * 0.5;
    balloon.vy = 0;

    chimneys = [];
    birds = [];

    wind.force = 1.5;
    score = 0;
}

// ================= PLAYER =================
function updatePlayer(){

    if(press) balloon.vy += balloon.lift;

    balloon.vy += balloon.gravity;
    balloon.vy *= balloon.drag;

    balloon.y += balloon.vy;

    if(balloon.y < 0 || balloon.y > H) gameOver();
}

// ================= OBSTACLES =================
let lastSpawn = 0;

function updateObstacles(){

    if(Date.now() - lastSpawn > 1200){
        spawnChimney();
        if(Math.random()>0.5) spawnBird();
        lastSpawn = Date.now();
    }

    chimneys.forEach((c,i)=>{
        c.x -= wind.force + 2;

        if(balloon.x + 30 > c.x && balloon.x - 30 < c.x + c.width){
            if(balloon.y + 30 > H - c.height){
                gameOver();
            }
        }

        if(c.x < -100) chimneys.splice(i,1);
    });

    birds.forEach((b,i)=>{
        b.x -= wind.force + b.speed;

        let dx = balloon.x - b.x;
        let dy = balloon.y - b.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if(dist < 35) gameOver();

        if(b.x < -50) birds.splice(i,1);
    });
}

// ================= DIFFICULTY =================
function updateDifficulty(){
    wind.force += 0.0007; // giderek zorlaşır
}

// ================= DRAW =================
function drawSky(){
    let g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#FF8C42");
    g.addColorStop(1,"#87CEEB");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
}

function drawChimneys(){
    ctx.fillStyle="#8B5A3C";
    chimneys.forEach(c=>{
        ctx.fillRect(c.x, H - c.height, c.width, c.height);
    });
}

function drawBirds(){
    ctx.fillStyle="black";
    birds.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
        ctx.fill();
    });
}

function drawBalloon(){
    ctx.save();
    ctx.translate(balloon.x, balloon.y);

    let tilt = balloon.vy * 0.05;
    ctx.rotate(tilt);

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(0,0,30,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#5D4037";
    ctx.fillRect(-10,30,20,15);

    ctx.restore();
}

// ================= LOOP =================
function update(){
    if(gameState !== STATE.PLAY) return;

    updatePlayer();
    updateObstacles();
    updateDifficulty();

    score += 0.1;
    document.getElementById("score").innerText = Math.floor(score)+" m";
}

function draw(){
    ctx.clearRect(0,0,W,H);

    drawSky();
    drawChimneys();
    drawBirds();
    drawBalloon();
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

// ================= CONTROL =================
function startGame(){
    reset();
    gameState = STATE.PLAY;
    document.getElementById("menu").style.display="none";
}

function gameOver(){
    gameState = STATE.OVER;
    document.getElementById("gameover").style.display="flex";
    document.getElementById("finalScore").innerText = "Mesafe: "+Math.floor(score)+" m";
}

function restart(){
    document.getElementById("gameover").style.display="none";
    document.getElementById("menu").style.display="flex";
    gameState = STATE.MENU;
}

</script>

</body>
</html>
