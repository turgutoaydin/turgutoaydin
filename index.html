<!DOCTYPE html>
<html>
<head>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.x.x/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.x.x/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css" rel="stylesheet" />
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
</head>
<body>
  <div id="map" style="width:100%; height:600px;"></div>

  <script>
    mapboxgl.accessToken = 'YOUR_MAPBOX_ACCESS_TOKEN';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/streets-v12',
      center: [28.9784, 41.0082], // İstanbul
      zoom: 10
    });

    const draw = new MapboxDraw({
      displayControlsDefault: false,
      controls: {
        polygon: true,
        trash: true
      },
      defaultMode: 'draw_polygon' // Direkt polygon çizme modunda başla
    });

    map.addControl(draw);

    // Çizim bitince koordinatları al
    map.on('draw.create', function(e) {
      const data = draw.getAll();
      if (data.features.length > 0) {
        const polygon = data.features[0];
        const coordinates = polygon.geometry.coordinates[0]; // [[lng, lat], ...]
        
        console.log('Hizmet alanı koordinatları:', coordinates);
        
        // Alan hesapla (km²)
        const area = turf.area(polygon) / 1000000;
        console.log('Alan:', area.toFixed(2), 'km²');

        // Buraya kaydet: API'ye POST et, veritabanına yaz
        // saveServiceArea(coordinates);
      }
    });

    // Silme event'i
    map.on('draw.delete', () => {
      console.log('Polygon silindi');
    });
  </script>
</body>
</html>
