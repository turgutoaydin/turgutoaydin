<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balloon Game</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
<style>
body { margin:0; }
</style>
</head>
<body>

<script>

const config = {
    type: Phaser.AUTO,
    width: 360,
    height: 640,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 200 } }
    },
    scene: {
        preload,
        create,
        update
    }
};

let balloon;
let cursors;
let gas = 100;
let wind = 30;

const game = new Phaser.Game(config);

function preload() {
    this.load.image('balloon', 'https://labs.phaser.io/assets/sprites/hotairballoon.png');
    this.load.image('bird', 'https://labs.phaser.io/assets/sprites/bird.png');
}

function create() {

    balloon = this.physics.add.sprite(180, 500, 'balloon');
    balloon.setCollideWorldBounds(true);

    cursors = this.input.keyboard.createCursorKeys();

    // Kuşlar
    this.birds = this.physics.add.group();

    this.time.addEvent({
        delay: 2000,
        loop: true,
        callback: () => {
            let bird = this.birds.create(Phaser.Math.Between(0, 360), 0, 'bird');
            bird.setVelocityY(100);
        }
    });

    this.physics.add.collider(balloon, this.birds, () => {
        alert("Patladın!");
        location.reload();
    });

}

function update() {

    // Rüzgar etkisi
    balloon.setVelocityX(wind);

    // Sol sağ kontrol
    if (cursors.left.isDown) {
        balloon.setVelocityX(-150);
    } else if (cursors.right.isDown) {
        balloon.setVelocityX(150);
    }

    // Gaz (yukarı çıkış)
    if (cursors.up.isDown && gas > 0) {
        balloon.setVelocityY(-200);
        gas -= 0.3;
    }

    // Gaz biterse düş
    if (gas <= 0) {
        balloon.setVelocityY(300);
    }

}

</script>

</body>
</html>
