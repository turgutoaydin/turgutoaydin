<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>🌋 Kapadokya Balonu - Anime Uçuşu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  body {margin:0; padding:0; background:#111; touch-action:none; overflow:hidden;}
  canvas {display:block; margin:0 auto; max-width:100%; height:auto;}
  #controls button {
    position:absolute; background:rgba(255,255,255,0.25); color:white; border:3px solid rgba(255,255,255,0.6);
    font-size:32px; width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
  }
  #gas {width:115px; height:115px; background:rgba(255,140,0,0.4); font-size:18px; flex-direction:column; bottom:150px; left:50%; transform:translateX(-50%);}
</style>
</head>
<body>
<canvas id="canvas" width="380" height="700"></canvas>

<div id="controls" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;">
  <button id="left" style="bottom:40px; left:25px;">←</button>
  <button id="right" style="bottom:40px; right:25px;">→</button>
  <button id="gas">🔥<br><span style="font-size:13px;">GAZ</span></button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = 380;
let H = canvas.height = 700;

let balloon = {x: W/2, y: H-200, vx:0, vy:0, r:24};
let gas = 100;
let score = 0;
let gameOver = false;
let wind = 1.8;
let windTimer = 0;
let birds = [];

let leftPressed = false, rightPressed = false, gasPressed = false;

const GRAVITY = 0.085;
const LIFT = 0.22;

function spawnBird() {
  birds.push({x: Math.random()<0.5 ? -20 : W+20, y:100+Math.random()*(H*0.55), vx:Math.random()<0.5?2.8:-2.8});
}

// Butonlar
document.getElementById('left').addEventListener('touchstart', e=>{e.preventDefault(); leftPressed=true;});
document.getElementById('left').addEventListener('touchend', ()=>{leftPressed=false;});
document.getElementById('right').addEventListener('touchstart', e=>{e.preventDefault(); rightPressed=true;});
document.getElementById('right').addEventListener('touchend', ()=>{rightPressed=false;});
document.getElementById('gas').addEventListener('touchstart', e=>{e.preventDefault(); gasPressed=true;});
document.getElementById('gas').addEventListener('touchend', ()=>{gasPressed=false;});

// Klavye (bilgisayarda test için)
document.addEventListener('keydown', e=>{ 
  if(e.key==='ArrowLeft'||e.key==='a') leftPressed=true; 
  if(e.key==='ArrowRight'||e.key==='d') rightPressed=true; 
  if(e.key===' ') gasPressed=true;
});
document.addEventListener('keyup', e=>{ 
  if(e.key==='ArrowLeft'||e.key==='a') leftPressed=false; 
  if(e.key==='ArrowRight'||e.key==='d') rightPressed=false; 
  if(e.key===' ') gasPressed=false;
});

function update() {
  if(gameOver) return;
  score += 0.2;

  // Yükselme / Alçalma
  if(gasPressed && gas>0){
    balloon.vy = Math.max(balloon.vy - LIFT, -4.5);
    gas -= 0.28;
  } else {
    balloon.vy += GRAVITY;
  }

  // Rüzgar + yönlendirme
  balloon.vx += wind * 0.045;
  if(leftPressed) balloon.vx -= 3.5;
  if(rightPressed) balloon.vx += 3.5;
  balloon.vx *= 0.82;

  balloon.x += balloon.vx;
  balloon.y += balloon.vy;

  // Dinamik dağ kenarları (rüzgara göre değişir)
  const leftWall = 38 + 28 * Math.sin(score/18);
  const rightWall = W - 38 - 25 * Math.sin(score/22 + 1);
  if(balloon.x - balloon.r < leftWall || balloon.x + balloon.r > rightWall) gameOver = true;

  if(balloon.y > H-40 || balloon.y < 30) gameOver = true;
  if(gas <= 0) balloon.vy += 0.12; // ağır düşüş

  // Kuşlar
  for(let i=birds.length-1; i>=0; i--){
    let b = birds[i];
    b.x += b.vx;
    if(b.x < -100 || b.x > W+100){ birds.splice(i,1); continue; }
    let dx = b.x - balloon.x;
    let dy = b.y - balloon.y;
    if(dx*dx + dy*dy < 1200) gameOver = true;
  }

  if(Math.random()<0.035) spawnBird();

  // Rüzgar değişimi
  windTimer++;
  if(windTimer > 120){
    wind = (Math.random()*4 - 2);
    windTimer = 0;
  }
  gas = Math.max(0, gas);
}

function drawBackground(){
  let gr = ctx.createLinearGradient(0,0,0,H*0.8);
  gr.addColorStop(0,'#5C9ED6'); gr.addColorStop(1,'#B0E0FF');
  ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);

  // Peri bacaları (Cappadocia manzarası)
  ctx.fillStyle = '#C38B5E';
  ctx.beginPath(); ctx.moveTo(0,H*0.75); ctx.lineTo(W*0.3,H*0.45); ctx.lineTo(W*0.7,H*0.62); ctx.lineTo(W,H*0.55); ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.fill();
}

function draw(){
  drawBackground();

  // Balon (anime tarzı)
  ctx.save();
  ctx.translate(balloon.x, balloon.y-10);
  ctx.fillStyle = '#FF4D00';
  ctx.beginPath(); ctx.ellipse(0,-32,27,40,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFAA00';
  ctx.beginPath(); ctx.ellipse(0,-30,20,28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5C4033';
  ctx.fillRect(-10,12,20,18);
  ctx.strokeStyle = '#222'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-9,12); ctx.lineTo(-16,-18); ctx.moveTo(9,12); ctx.lineTo(15,-19); ctx.stroke();
  ctx.restore();

  // Kuşlar
  ctx.fillStyle = '#1E3A5F';
  for(let b of birds){
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(b.vx>0?1:-1,1);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(15,-8); ctx.lineTo(8,-2); ctx.lineTo(18,5); ctx.fill();
    ctx.restore();
  }

  // Dinamik dağ duvarları
  const leftWall = 38 + 28*Math.sin(score/18);
  const rightWall = W-38-25*Math.sin(score/22+1);
  ctx.fillStyle = '#A67C5D';
  ctx.fillRect(0,0,leftWall+8,H);
  ctx.fillRect(rightWall-8,0,W,H);

  // Gaz deposu
  ctx.strokeStyle = '#fff'; ctx.lineWidth=6;
  ctx.strokeRect(W-42,80,26,220);
  ctx.fillStyle = gas>35?'#FFCC00':'#FF3333';
  ctx.fillRect(W-38,85+(215-gas*2.15),18,gas*2.15);

  // Rüzgar göstergesi
  ctx.fillStyle = '#fff'; ctx.font='bold 17px Arial';
  ctx.fillText('RÜZGAR '+(wind>0?'→':'←')+' '+Math.abs(wind).toFixed(1),22,55);

  // Skor
  ctx.fillStyle='white'; ctx.shadowColor='#000'; ctx.shadowBlur=8; ctx.font='bold 26px Arial';
  ctx.fillText('⌈ '+Math.floor(score)+'m',20,28);

  if(gameOver){
    ctx.fillStyle='rgba(178,34,34,0.85)';
    ctx.fillRect(0,H/2-90,W,170);
    ctx.fillStyle='white'; ctx.font='bold 42px Arial'; ctx.textAlign='center';
    ctx.fillText('BALON PATLADI!',W/2,H/2-20);
    ctx.font='20px Arial';
    ctx.fillText('Yüksekliğin: '+Math.floor(score)+' metre',W/2,H/2+40);
    ctx.fillText('Tekrar oynamak için sayfayı yenile',W/2,H/2+80);
  }
}

function gameLoop(){
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

spawnBird();
gameLoop();
</script>
</body>
</html>
