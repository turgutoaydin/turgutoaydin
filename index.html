<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<title>Cappadocia Balloon Ultimate</title>
<style>
    body { margin:0; overflow:hidden; background:#000; font-family:Arial, sans-serif; touch-action: none; }
    canvas { display:block; }

    #ui { position:absolute; inset:0; pointer-events:none; z-index:10; }
    .hud {
        position:absolute;
        top:12px;
        left:50%;
        transform:translateX(-50%);
        text-align:center;
        color:#fff;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        font-weight:bold;
    }
    #score { font-size:26px; }
    #fuelBar {
        width:170px;
        height:12px;
        background:rgba(0,0,0,0.6);
        margin:6px auto;
        border-radius:8px;
        overflow:hidden;
        border:2px solid #ddd;
    }
    #fuelFill {
        height:100%;
        background:linear-gradient(90deg, #00ff88, #ffeb3b, #ff4444);
        width:100%;
        transition: width 0.15s;
    }
    .screen {
        position:absolute;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:rgba(0,0,0,0.78);
        color:#fff;
        pointer-events:auto;
        text-align:center;
    }
    button {
        padding:14px 45px;
        font-size:21px;
        border:none;
        border-radius:30px;
        background:linear-gradient(#ff9f00, #f57c00);
        color:white;
        box-shadow:0 5px 15px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
    <div class="hud">
        <div id="score">0 m</div>
        <div id="wind">Rüzgar: 1.0</div>
        <div id="difficulty">Kolay</div>
        <div id="fuelBar"><div id="fuelFill"></div></div>
    </div>

    <div id="menu" class="screen">
        <h1 style="font-size:48px;margin:0 0 15px;">🎈 Kapadokya Uçuşu</h1>
        <button onclick="startGame()">Başla</button>
    </div>

    <div id="gameover" class="screen" style="display:none;">
        <h1>Oyun Bitti</h1>
        <p id="finalScore" style="font-size:26px;margin:15px 0;"></p>
        <button onclick="restart()">Tekrar Dene</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>

// ================= SETUP =================
const canvas = document.getElementById("game");
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false; // mobil performans için kapalı

scene.background = new THREE.Color(0xFF9F5E);
scene.fog = new THREE.Fog(0xFF9F5E, 60, 220);

camera.position.set(0, 18, 45);
camera.lookAt(0, 10, 0);

function resize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', resize);

// Işık
scene.add(new THREE.AmbientLight(0xffeedd, 0.75));
const sun = new THREE.DirectionalLight(0xffddaa, 1.1);
sun.position.set(30, 50, 40);
scene.add(sun);

// ================= BALON (eski ölçüye yakın) =================
const balloonGroup = new THREE.Group();
const balloonGeo = new THREE.SphereGeometry(3.2, 24, 24); // küçültüldü
const balloonMat = new THREE.MeshPhongMaterial({ color: 0xFF4500, shininess: 8 });
const balloonMesh = new THREE.Mesh(balloonGeo, balloonMat);
balloonMesh.castShadow = true;
balloonGroup.add(balloonMesh);

// Sepet
const basket = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, 1.6, 1.8),
    new THREE.MeshPhongMaterial({ color: 0x8B5A2B })
);
basket.position.y = -4.8;
balloonGroup.add(basket);

// Basit ipler
const ropeMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
for (let i = -1; i <= 1; i += 2) {
    const rope = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 4.8, 6), ropeMat);
    rope.position.set(i * 1.1, -2.6, 0);
    rope.rotation.z = i * 0.25;
    balloonGroup.add(rope);
}

// Ateş
const flame = new THREE.Mesh(
    new THREE.ConeGeometry(0.55, 2.2, 6),
    new THREE.MeshBasicMaterial({ color: 0xFF8800 })
);
flame.position.y = -4.2;
flame.rotation.x = Math.PI;
balloonGroup.add(flame);
flame.visible = false;

scene.add(balloonGroup);

let balloon = {
    x: 0,
    y: 12,
    vy: 0,
    gravity: 0.22,
    lift: -1.05,
    drag: 0.978
};

// ================= NESNELER =================
let chimneys = [], birds = [], fuels = [];

// Peri bacası (daha ince ve gerçekçi)
function createChimney() {
    const group = new THREE.Group();
    const h = 14 + Math.random() * 14;
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(2.2, 3.8, h, 5),
        new THREE.MeshPhongMaterial({ color: 0xE0B080 })
    );
    body.position.y = h/2 - 3;
    body.castShadow = true;
    group.add(body);

    const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(3.1, 2.6, 1.6, 5),
        new THREE.MeshPhongMaterial({ color: 0xC09060 })
    );
    cap.position.y = h - 2.5;
    group.add(cap);

    group.userData = { h: h };
    return group;
}

function createBird() {
    const bird = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.55, 8, 8), new THREE.MeshPhongMaterial({color:0x222222}));
    bird.add(body);
    bird.userData = { phase: Math.random()*10, speed: 2.5 + Math.random()*2 };
    return bird;
}

function createFuel() {
    const g = new THREE.Group();
    const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 2, 8), new THREE.MeshPhongMaterial({color:0xFFCC33}));
    tank.rotation.x = Math.PI/2;
    g.add(tank);
    g.scale.set(0.9,0.9,0.9);
    return g;
}

// ================= INPUT =================
let pressing = false;
window.addEventListener("pointerdown", () => pressing = true);
window.addEventListener("pointerup", () => pressing = false);
window.addEventListener("touchstart", (e)=>{ e.preventDefault(); pressing = true; }, {passive:false});
window.addEventListener("touchend", () => pressing = false);

// ================= STATE =================
let gameState = "MENU";
let fuel = 100;
let score = 0;
let wind = 1.6;
let lastSpawn = 0;

// ================= RESET =================
function reset() {
    balloon.x = 0;
    balloon.y = 12;
    balloon.vy = 0;
    fuel = 100;
    score = 0;
    wind = 1.6;

    chimneys.forEach(c => scene.remove(c)); chimneys = [];
    birds.forEach(b => scene.remove(b)); birds = [];
    fuels.forEach(f => scene.remove(f)); fuels = [];
}

// ================= SPAWN =================
function spawn() {
    if (Date.now() - lastSpawn < 950) return;

    // Peri bacası
    if (Math.random() > 0.2) {
        const c = createChimney();
        c.position.set(55 + Math.random()*15, -4, 0);
        scene.add(c);
        chimneys.push(c);
    }

    // Kuş
    if (Math.random() > 0.4) {
        const b = createBird();
        b.position.set(60, 15 + Math.random()*22, 0);
        scene.add(b);
        birds.push(b);
    }

    // Yakıt
    if (Math.random() > 0.6) {
        const f = createFuel();
        f.position.set(58, 10 + Math.random()*25, 0);
        scene.add(f);
        fuels.push(f);
    }

    lastSpawn = Date.now();
}

// ================= UPDATE =================
function update() {
    if (gameState !== "PLAY") return;

    // Fizik
    if (pressing && fuel > 0) {
        balloon.vy += balloon.lift;
        fuel -= 0.32;
        flame.visible = true;
        flame.scale.set(1, 1.1 + Math.random()*0.4, 1);
    } else {
        flame.visible = false;
    }

    balloon.vy += balloon.gravity;
    balloon.vy *= balloon.drag;
    balloon.y += balloon.vy * 0.6;   // biraz yavaşlatıldı ki kontrol edilebilir olsun

    // Tilt
    balloonGroup.rotation.z = balloon.vy * 0.045;
    balloonGroup.position.set(balloon.x, balloon.y, 0);

    if (balloon.y < 2 || balloon.y > 48) gameOver();

    const moveSpeed = wind + 2.4;

    // Peri bacaları
    for (let i = chimneys.length - 1; i >= 0; i--) {
        const c = chimneys[i];
        c.position.x -= moveSpeed;

        const distX = Math.abs(c.position.x);
        const distY = Math.abs(balloon.y - (c.position.y + c.userData.h / 2));

        if (distX < 7 && distY < c.userData.h / 2 + 5) gameOver();

        if (c.position.x < -70) {
            scene.remove(c);
            chimneys.splice(i, 1);
        }
    }

    // Kuşlar
    for (let i = birds.length - 1; i >= 0; i--) {
        const b = birds[i];
        b.position.x -= moveSpeed + b.userData.speed;
        b.userData.phase += 0.22;
        b.rotation.z = Math.sin(b.userData.phase) * 0.4;

        const dx = balloon.x - b.position.x;
        const dy = balloon.y - b.position.y;
        if (dx*dx + dy*dy < 25) gameOver();

        if (b.position.x < -70) {
            scene.remove(b);
            birds.splice(i, 1);
        }
    }

    // Yakıt
    for (let i = fuels.length - 1; i >= 0; i--) {
        const f = fuels[i];
        f.position.x -= moveSpeed;
        f.rotation.y += 0.04;

        const dx = balloon.x - f.position.x;
        const dy = balloon.y - f.position.y;
        if (dx*dx + dy*dy < 30) {
            fuel = Math.min(100, fuel + 32);
            scene.remove(f);
            fuels.splice(i, 1);
        }

        if (f.position.x < -70) {
            scene.remove(f);
            fuels.splice(i, 1);
        }
    }

    wind += 0.00075;
    score += 0.16;

    // UI
    document.getElementById("score").innerText = Math.floor(score) + " m";
    document.getElementById("wind").innerText = "Rüzgar: " + wind.toFixed(1);
    document.getElementById("fuelFill").style.width = fuel + "%";

    let diff = "Kolay";
    if (wind > 3.2) diff = "Orta";
    if (wind > 4.8) diff = "Zor";
    if (wind > 6.2) diff = "Çılgın";
    document.getElementById("difficulty").innerText = diff;

    spawn();
}

// ================= ANIMATE =================
function animate() {
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
}
animate();

// ================= GAME FUNCTIONS =================
function startGame() {
    reset();
    gameState = "PLAY";
    document.getElementById("menu").style.display = "none";
}

function gameOver() {
    gameState = "OVER";
    document.getElementById("gameover").style.display = "flex";
    document.getElementById("finalScore").innerText = "Mesafe: " + Math.floor(score) + " metre";
}

function restart() {
    document.getElementById("gameover").style.display = "none";
    document.getElementById("menu").style.display = "flex";
    gameState = "MENU";
}

</script>
</body>
</html>
