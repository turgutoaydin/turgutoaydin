<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Etourgood • Cappadocia</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Space+Grotesk:wght@600;700;900&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #451a03; /* Sıcak toprak rengi başlangıç */
      overflow: hidden; 
      font-family: 'Inter', system-ui, sans-serif;
      touch-action: none; 
      -webkit-tap-highlight-color: transparent;
      position: fixed;
      width: 100%;
      height: 100%;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas { 
      display: block; 
      position: absolute;
      top: 0;
      left: 0;
    }

    .ui-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }
    
    .glass-panel {
      background: rgba(69, 26, 3, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid rgba(249, 115, 22, 0.25);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      color: #fffbeb;
    }
    
    .play-btn {
      background: linear-gradient(135deg, #f97316 0%, #e11d48 100%);
      box-shadow: 0 8px 0 #9a3412, 0 20px 30px rgba(234, 88, 12, 0.4);
      border-radius: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      transition: all 0.12s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.25);
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      cursor: pointer;
      pointer-events: auto;
      text-transform: uppercase;
      color: white;
      font-family: 'Inter', sans-serif;
    }
    .play-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #9a3412, 0 8px 15px rgba(234, 88, 12, 0.5);
    }
    
    .hud-wrapper {
      position: absolute;
      top: max(15px, env(safe-area-inset-top));
      left: max(15px, env(safe-area-inset-left));
      right: max(15px, env(safe-area-inset-right));
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      opacity: 0;
      transition: opacity 0.6s;
      gap: 12px;
      flex-wrap: wrap;
    }

    .score-box {
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }
    
    .fuel-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .fuel-bar-bg {
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      width: 140px;
      height: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.5);
    }
    
    .fuel-fill {
      height: 100%;
      background: linear-gradient(90deg, #ef4444, #f97316, #fde047);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.7);
      transition: width 0.08s linear, background-color 0.3s;
    }
    .fuel-fill.low {
      background: linear-gradient(90deg, #ef4444, #991b1b);
      animation: pulseFuel 0.4s infinite alternate;
    }
    
    @keyframes pulseFuel {
      from { box-shadow: 0 0 5px #ef4444; }
      to { box-shadow: 0 0 20px #ef4444; }
    }
    
    .power-row {
      display: flex;
      gap: 12px;
    }
    
    .power-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s;
      filter: grayscale(1);
      opacity: 0.35;
    }
    .power-icon.active {
      filter: grayscale(0);
      opacity: 1;
      border-color: #f97316;
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.9);
      animation: glowPulse 1.5s infinite;
      transform: scale(1.08);
    }
    @keyframes glowPulse {
      0% { box-shadow: 0 0 8px rgba(249, 115, 22, 0.5); }
      50% { box-shadow: 0 0 28px rgba(249, 115, 22, 1); }
      100% { box-shadow: 0 0 8px rgba(249, 115, 22, 0.5); }
    }
    
    .stage-pop {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: clamp(3rem, 8vw, 5rem);
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,255,255,0.9);
      background: linear-gradient(135deg, #fcd34d, #f97316);
      -webkit-background-clip: text;
      text-shadow: 0 15px 40px rgba(0,0,0,0.5);
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      white-space: nowrap;
      letter-spacing: 8px;
      pointer-events: none;
    }
    
    .etourgood-gradient {
      background: linear-gradient(135deg, #fcd34d 0%, #f97316 50%, #e11d48 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-icon {
      font-size: 3.5rem;
      filter: drop-shadow(0 0 25px rgba(249, 115, 22, 0.6));
      animation: floatLogo 3s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    
    .high-score-badge {
      background: rgba(249, 115, 22, 0.2);
      border: 1px solid rgba(249, 115, 22, 0.4);
      border-radius: 12px;
      padding: 6px 18px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #fde047;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <div class="ui-layer">
    
    <div id="hudContainer" class="hud-wrapper">
      
      <div class="glass-panel score-box">
        <span style="font-size:1.2rem; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4));">📍</span>
        <span id="distDisplay" style="font-weight:800; font-size:1.1rem; letter-spacing: 0.5px;">0 m</span>
      </div>
      
      <div class="fuel-container">
        <div class="glass-panel" style="padding: 4px 14px; font-size: 0.8rem; font-weight: 800; color: #fde047; letter-spacing: 1px;">YAKIT <span id="fuelDisplay" style="color: #fff;">100%</span></div>
        <div class="fuel-bar-bg">
          <div id="fuelBarFill" class="fuel-fill" style="width: 100%;"></div>
        </div>
      </div>
      
      <div class="power-row">
        <div id="shieldPowerIcon" class="power-icon">🛡️</div>
        <div id="magnetPowerIcon" class="power-icon">🧲</div>
        <div id="boostPowerIcon" class="power-icon">⚡</div>
      </div>
    </div>
    
    <div id="stageAnnounce" class="stage-pop">SEVİYE 2</div>
    
    <div id="menuScreen" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: auto; background: radial-gradient(circle at 50% 30%, rgba(69, 26, 3, 0.6) 0%, rgba(30, 27, 75, 0.9) 100%);">
      <div class="glass-panel" style="padding: 3rem 2rem; width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(249, 115, 22, 0.4);">
        <div class="logo-icon">🎈🌅</div>
        <h1 style="font-family:'Space Grotesk',sans-serif; font-weight:900; font-size:3.2rem; margin:0; line-height:1; letter-spacing: 2px;" class="etourgood-gradient">ETOURGOOD</h1>
        <p style="color:#fdba74; font-weight:800; margin-bottom:1.8rem; font-size:1.1rem; letter-spacing: 4px; margin-top: 12px; text-transform: uppercase;">Cappadocia</p>
        <div id="highScoreMenu" class="high-score-badge" style="margin-bottom: 24px; display: none;">🏆 En İyi Uçuş: <span id="highScoreMenuText">0 m</span></div>
        <button id="startBtn" class="play-btn" style="width:100%; padding:20px; color:white; font-size:1.4rem; border:none;">
          UÇUŞA BAŞLA
        </button>
        <p style="color:#fcd34d; opacity: 0.8; font-size:0.8rem; margin-top:16px; font-weight:600;">Ekrana basılı tutarak yüksel • Bırakarak süzül</p>
      </div>
    </div>
    
    <div id="gameOverScreen" style="position: absolute; inset: 0; display: none; align-items: center; justify-content: center; pointer-events: auto; background: radial-gradient(circle at center, rgba(69, 26, 3, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
      <div class="glass-panel" style="padding: 2.5rem 2rem; width: 90%; max-width: 400px; text-align: center; border-color: rgba(239, 68, 68, 0.5);">
        <div style="font-size: 4.5rem; filter: drop-shadow(0 0 25px rgba(239,68,68,0.8));">💥</div>
        <h2 style="font-family:'Space Grotesk'; font-weight:900; color:#f87171; font-size:2.2rem; margin:0.5rem 0; letter-spacing: 2px;">SERT İNİŞ!</h2>
        <p style="color:#fdba74; font-weight:600; margin-top:12px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Gezilen Mesafe</p>
        <p id="finalDistText" class="etourgood-gradient" style="font-size:3.8rem; font-weight:900; margin:0; text-shadow: 0 4px 20px rgba(249,115,22,0.4);">0 m</p>
        <div id="newHighScoreBadge" style="display: none; color: #fde047; font-weight: 900; margin: 8px 0; letter-spacing: 2px; animation: pulseFuel 0.6s infinite alternate;">🌟 YENİ REKOR! 🌟</div>
        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <button id="retryBtn" class="play-btn" style="flex:1; padding:16px; color:white; font-size:1.1rem; border:none;">
            TEKRAR
          </button>
          <button id="menuBtn" class="play-btn" style="background: rgba(255,255,255,0.1); box-shadow: 0 6px 0 rgba(0,0,0,0.4), 0 15px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); flex:1; padding:16px; color:white; font-size:1.1rem;">
            MENÜ
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      
      let W, H, scale;
      
      function resizeCanvas() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        scale = Math.min(W / 550, H / 950);
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      
      let audioCtx = null;
      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {
          audioCtx = null;
        }
      }
      function playTone(freq, type='sine', duration=0.15, vol=0.08, rampDown=true) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        gain.gain.setValueAtTime(vol, now);
        if (rampDown) gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.05);
      }
      function sfxCollect() { playTone(880, 'sine', 0.1, 0.1); setTimeout(() => playTone(1100, 'sine', 0.1, 0.1), 80); }
      function sfxShieldBreak() { playTone(200, 'triangle', 0.3, 0.12); }
      function sfxExplosion() { playTone(50, 'sawtooth', 0.5, 0.15, false); playTone(30, 'square', 0.6, 0.1, false); }
      function sfxStageUp() { playTone(660, 'sine', 0.2, 0.12); setTimeout(() => playTone(880, 'sine', 0.2, 0.12), 150); }
      function sfxClick() { playTone(600, 'sine', 0.06, 0.04); }
      
      const STATE = { MENU: 0, PLAYING: 1, OVER: 2, CRASHING: 3 };
      let gameState = STATE.MENU;
      
      let balloon = {
        x: 0, y: 0, vy: 0,
        radius: 38 * scale,
        gravity: 0.22 * scale,
        lift: -0.62 * scale,
        drag: 0.98
      };
      
      let fuel = 100;
      let distance = 0;
      let stage = 1;
      let windSpeed = 3.5;
      
      let chimneys = [];
      let birds = [];
      let stormClouds = [];
      let rivalBalloons = [];
      let collectibles = [];
      let particles = [];
      let floatingTexts = [];
      let bgClouds = [];
      let mountains = [];
      let stars = [];
      
      let shieldActive = false;
      let magnetActive = false;
      let magnetTimer = 0;
      let boostActive = false;
      let boostTimer = 0;
      
      let pressing = false;
      let screenShake = 0;
      
      let highScore = 0;
      try {
        const saved = localStorage.getItem('etourgood_sky_high');
        if (saved) highScore = parseInt(saved, 10) || 0;
      } catch(e) {}
      
      // Kapadokya Gün Doğumu Renk Paleti (Gece -> Gün Doğumu -> Sabah -> Gündüz)
      const skyPalette = [
        { top: "#1e1b4b", bottom: "#9a3412", m1: "#451a03", m2: "#290f02" }, // Safak
        { top: "#4c1d95", bottom: "#f97316", m1: "#78350f", m2: "#451a03" }, // Gunes Dogusu
        { top: "#0284c7", bottom: "#fcd34d", m1: "#9a3412", m2: "#78350f" }, // Sabah
        { top: "#38bdf8", bottom: "#fef08a", m1: "#b45309", m2: "#9a3412" }  // Oglen
      ];
      let currentSky = { ...skyPalette[0] };
      let currentStarAlpha = 1;
      
      const distDisplay = document.getElementById('distDisplay');
      const fuelDisplay = document.getElementById('fuelDisplay');
      const fuelBarFill = document.getElementById('fuelBarFill');
      const hudContainer = document.getElementById('hudContainer');
      const shieldPowerIcon = document.getElementById('shieldPowerIcon');
      const magnetPowerIcon = document.getElementById('magnetPowerIcon');
      const boostPowerIcon = document.getElementById('boostPowerIcon');
      const stageAnnounce = document.getElementById('stageAnnounce');
      const menuScreen = document.getElementById('menuScreen');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const finalDistText = document.getElementById('finalDistText');
      const newHighScoreBadge = document.getElementById('newHighScoreBadge');
      const highScoreMenu = document.getElementById('highScoreMenu');
      const highScoreMenuText = document.getElementById('highScoreMenuText');
      
      function updateUI() {
        distDisplay.textContent = Math.floor(distance) + ' m';
        fuelDisplay.textContent = Math.floor(fuel) + '%';
        fuelBarFill.style.width = fuel + '%';
        
        if(fuel < 25) fuelBarFill.classList.add('low');
        else fuelBarFill.classList.remove('low');
        
        if (shieldActive) shieldPowerIcon.classList.add('active');
        else shieldPowerIcon.classList.remove('active');
        if (magnetActive) magnetPowerIcon.classList.add('active');
        else magnetPowerIcon.classList.remove('active');
        if (boostActive) boostPowerIcon.classList.add('active');
        else boostPowerIcon.classList.remove('active');
      }
      
      function updateHighScoreUI() {
        if (highScore > 0) {
          highScoreMenu.style.display = 'inline-block';
          highScoreMenuText.textContent = highScore + ' m';
        } else {
          highScoreMenu.style.display = 'none';
        }
      }
      updateHighScoreUI();
      
      function initStars() {
        stars = [];
        for(let i=0; i<150; i++) {
          stars.push({
            x: Math.random() * W,
            y: Math.random() * H * 0.6,
            radius: Math.random() * 1.5 + 0.5,
            twinkle: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.2 + 0.1
          });
        }
      }
      
      function initMountains() {
        mountains = [];
        for(let i=0; i<3; i++) {
          let layer = [];
          for(let j=0; j<W/(80*scale) + 2; j++) {
            // Kapadokya vadi engebesi
            layer.push({ x: j*120*scale, y: random(H*0.7, H*0.85) + i*35*scale });
          }
          mountains.push(layer);
        }
      }

      function fullReset() {
        balloon.x = W * 0.35;
        balloon.y = H * 0.5;
        balloon.vy = 0;
        fuel = 100;
        distance = 0;
        stage = 1;
        windSpeed = 3.5;
        shieldActive = false;
        magnetActive = false;
        magnetTimer = 0;
        boostActive = false;
        boostTimer = 0;
        screenShake = 0;
        currentStarAlpha = 1;
        
        chimneys = [];
        birds = [];
        stormClouds = [];
        rivalBalloons = [];
        collectibles = [];
        particles = [];
        floatingTexts = [];
        bgClouds = [];
        
        initStars();
        initMountains();
        currentSky = { ...skyPalette[0] };
        updateUI();
      }
      
      function checkStage() {
        let newStage = Math.floor(distance / 500) + 1;
        if (newStage > stage && newStage <= 4) {
          stage = newStage;
          windSpeed += 0.8;
          sfxStageUp();
          
          gsap.to(currentSky, {
            top: skyPalette[stage-1].top,
            bottom: skyPalette[stage-1].bottom,
            m1: skyPalette[stage-1].m1,
            m2: skyPalette[stage-1].m2,
            duration: 5
          });
          
          gsap.to(window, {
            currentStarAlpha: stage === 1 ? 1 : (stage === 2 ? 0.4 : 0),
            duration: 5
          });

          stageAnnounce.textContent = stage === 4 ? "GÜNDÜZ VAKTİ" : `SEVİYE ${stage}`;
          gsap.fromTo(stageAnnounce, 
            { scale: 0.1, opacity: 0, y: 30 },
            { scale: 1, opacity: 1, y: 0, duration: 0.8, ease: "back.out(1.7)", 
              onComplete: () => gsap.to(stageAnnounce, { opacity: 0, y: -30, delay: 1.8, duration: 0.6 })
            }
          );
        }
      }
      
      let lastSpawn = 0;
      function spawnObjects() {
        let now = performance.now();
        let delay = Math.max(380, 900 - stage * 80);
        if (now - lastSpawn < delay) return;
        lastSpawn = now;
        
        // Peri bacaları (Zemin engeli)
        if (Math.random() < 0.6) {
          chimneys.push({
            x: W + 50 * scale,
            width: random(80, 130) * scale,
            height: random(180, 350 + stage * 20) * scale,
            hue: random(25, 45) // Toprak/tüf renkleri
          });
        }
        
        // Güvercinler/Kuşlar
        if (Math.random() < 0.5) {
          let baseY = random(H * 0.1, H * 0.7);
          let count = Math.floor(random(2, 5));
          for(let i=0; i<count; i++) {
            birds.push({
              x: W + 80 * scale + i*random(20, 50)*scale,
              y: baseY + random(-40, 40)*scale,
              size: random(10, 15) * scale,
              speed: random(3.5, 6) * scale,
              wingOffset: random(0, Math.PI*2),
              bob: random(0, Math.PI*2)
            });
          }
        }
        
        // Kötü Hava / Fırtına Bulutları
        if (stage >= 2 && Math.random() < 0.3) {
          stormClouds.push({
            x: W + 100 * scale,
            y: random(H * 0.1, H * 0.8),
            radius: random(50, 80) * scale,
            speed: random(2, 4) * scale,
            lightningPhase: 0
          });
        }
        
        // Rakip Turist Balonları (Uçakların yerine)
        if (stage >= 2 && Math.random() < 0.4) {
          rivalBalloons.push({
            x: W + 120 * scale,
            y: random(H * 0.1, H * 0.65),
            size: random(25, 35) * scale,
            speed: random(1, 3) * scale, // Balonlar uçağa göre daha yavaş
            bobPhase: random(0, Math.PI*2),
            colorHue: random(0, 360)
          });
        }
        
        // Toplanabilirler
        if (Math.random() < 0.6) {
          let r = Math.random();
          let type = 'fuel';
          if (r > 0.9) type = 'shield';
          else if (r > 0.8) type = 'magnet';
          else if (r > 0.7 && stage >= 2) type = 'boost';
          collectibles.push({
            type,
            x: W + 60 * scale,
            y: random(H * 0.15, H * 0.8),
            radius: 18 * scale,
            bobPhase: random(0, Math.PI*2)
          });
        }
      }
      
      function random(a,b) { return Math.random()*(b-a)+a; }
      
      function addExplosion(x,y,color,count=25) {
        for(let i=0;i<count;i++) particles.push({
          x,y, 
          vx: (Math.random()-0.5)*20*scale, 
          vy: (Math.random()-0.5)*20*scale,
          life: 1.2, color, 
          size: random(3, 10)*scale
        });
      }

      function addDeathExplosion(x,y) {
        screenShake = 12 * scale;
        sfxExplosion();
        const colors = ['#f97316', '#facc15', '#ffffff', '#e11d48', '#451a03'];
        for(let i=0;i<120;i++) {
          particles.push({
            x: x + random(-30, 30)*scale,
            y: y + random(-30, 30)*scale,
            vx: (Math.random()-0.5)*40*scale,
            vy: (Math.random()-0.5)*40*scale,
            life: random(1, 3.5),
            color: colors[Math.floor(Math.random()*colors.length)],
            size: random(4, 22)*scale
          });
        }
      }

      function addText(txt,x,y,color) { floatingTexts.push({text:txt,x,y,life:1.4,color}); }
      
      function handleHit(type, hitX, hitY) {
        if (shieldActive) {
          shieldActive = false;
          sfxShieldBreak();
          addExplosion(balloon.x, balloon.y, '#fcd34d', 50);
          addText('KALKAN KIRILDI!', balloon.x, balloon.y-40*scale, '#fcd34d');
          updateUI();
          return false;
        }
        if (type === 'storm') {
          fuel = Math.max(0, fuel - 30);
          balloon.vy += 8 * scale;
          addExplosion(hitX, hitY, '#94a3b8', 30);
          addText('-30 YAKIT', balloon.x, balloon.y-35*scale, '#ef4444');
          if (fuel <= 0) { endGame(); return true; }
          return false;
        }
        
        addDeathExplosion(balloon.x, balloon.y);
        endGame();
        return true;
      }
      
      function updateGame() {
        if (gameState !== STATE.PLAYING) {
           for(let i=particles.length-1;i>=0;i--) { 
             let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.02; 
             if(p.life<=0) particles.splice(i,1); 
           }
           if (screenShake > 0) screenShake *= 0.9;
           return;
        }

        if (pressing && fuel > 0) {
          let liftPower = balloon.lift;
          if (boostActive) liftPower *= 1.5;
          balloon.vy += liftPower;
          fuel -= 0.15;
          if (Math.random()<0.6) particles.push({
            x: balloon.x+random(-6,6)*scale, y: balloon.y+balloon.radius*1.1,
            vx: random(-0.5,0.5)*scale, vy: random(1,5)*scale, life:0.8,
            color: boostActive ? '#fcd34d' : (Math.random() > 0.5 ? '#f97316' : '#facc15'),
            size: random(3,8)*scale
          });
        }
        
        balloon.vy += balloon.gravity;
        balloon.vy *= balloon.drag;
        balloon.y += balloon.vy;
        
        if (balloon.y - balloon.radius < -150*scale || balloon.y + balloon.radius*1.45 > H+30*scale) { 
           addDeathExplosion(balloon.x, balloon.y);
           endGame(); 
           return; 
        }
        
        if (magnetActive) {
          magnetTimer -= 0.016;
          if (magnetTimer <= 0) { magnetActive = false; updateUI(); }
        }
        if (boostActive) {
          boostTimer -= 0.016;
          if (boostTimer <= 0) { boostActive = false; updateUI(); }
        }
        
        let bLeft = balloon.x - balloon.radius * 0.85;
        let bRight = balloon.x + balloon.radius * 0.85;
        let bTop = balloon.y - balloon.radius * 0.9;
        let bBottom = balloon.y + balloon.radius * 1.45; 

        for(let i=chimneys.length-1;i>=0;i--) {
          let c=chimneys[i]; 
          c.x -= windSpeed*1.1;
          // Hitbox for fairy chimney
          let cLeft = c.x - c.width*0.2;
          let cRight = c.x + c.width*1.2;
          let cTop = H - c.height;
          if(bRight > cLeft && bLeft < cRight && bBottom > cTop) {
            // Rough triangle collision approximation
            let chimneyCenter = c.x + c.width/2;
            let widthAtBalloonY = c.width * 1.5 * ((H - bBottom) / c.height); 
            if(Math.abs(balloon.x - chimneyCenter) < Math.max(c.width*0.4, widthAtBalloonY)) {
               if(handleHit('chimney', balloon.x, bBottom)) return;
            }
          }
          if(c.x < -300*scale) chimneys.splice(i,1);
        }
        
        for(let i=birds.length-1;i>=0;i--) {
          let b=birds[i]; b.x -= windSpeed*0.8 + b.speed;
          b.y += Math.sin(performance.now()*0.005 + b.bob)*1.5*scale;
          if(b.x > bLeft && b.x < bRight && b.y > bTop && b.y < bBottom) {
            if(handleHit('bird', b.x, b.y)) return;
          }
          if(b.x < -100*scale) birds.splice(i,1);
        }
        
        for(let i=stormClouds.length-1;i>=0;i--) {
          let s=stormClouds[i]; s.x -= windSpeed*0.9 + s.speed; s.lightningPhase++;
          let dist = Math.hypot(balloon.x-s.x, balloon.y-s.y);
          if(dist < balloon.radius + s.radius*0.8) {
            handleHit('storm', s.x, s.y); stormClouds.splice(i,1); continue;
          }
          if(s.x < -200*scale) stormClouds.splice(i,1);
        }
        
        for(let i=rivalBalloons.length-1;i>=0;i--) {
          let rb=rivalBalloons[i]; 
          rb.x -= windSpeed*0.9 + rb.speed;
          rb.y += Math.sin(performance.now()*0.003 + rb.bobPhase)*0.8*scale;
          
          let dist = Math.hypot(balloon.x-rb.x, balloon.y-rb.y);
          if(dist < balloon.radius + rb.size) {
            if(handleHit('rivalBalloon', rb.x, rb.y)) return;
          }
          if(rb.x < -200*scale) rivalBalloons.splice(i,1);
        }
        
        for(let i=collectibles.length-1;i>=0;i--) {
          let c=collectibles[i];
          if(magnetActive && c.type==='fuel') {
            let ang=Math.atan2(balloon.y-c.y, balloon.x-c.x);
            let dist=Math.hypot(balloon.x-c.x, balloon.y-c.y);
            if(dist<500*scale) { c.x+=Math.cos(ang)*18*scale; c.y+=Math.sin(ang)*18*scale; }
            else c.x -= windSpeed*0.8;
          } else c.x -= windSpeed*0.8;
          
          if(c.x > bLeft && c.x < bRight && c.y > bTop && c.y < bBottom) {
            if(c.type==='fuel') { fuel=Math.min(100,fuel+25); sfxCollect(); addExplosion(c.x,c.y,'#f97316',15); }
            else if(c.type==='shield') { shieldActive=true; sfxCollect(); addText('KALKAN!',c.x,c.y-25*scale,'#38bdf8'); }
            else if(c.type==='magnet') { magnetActive=true; magnetTimer=15; sfxCollect(); addText('MIKNATIS!',c.x,c.y-25*scale,'#a855f7'); }
            else if(c.type==='boost') { boostActive=true; boostTimer=8; sfxCollect(); addText('HIZ!',c.x,c.y-25*scale,'#facc15'); }
            updateUI(); collectibles.splice(i,1);
          } else if(c.x<-100*scale) collectibles.splice(i,1);
        }
        
        for(let i=0; i<mountains.length; i++) {
          let speed = windSpeed * (0.15 + i*0.1);
          for(let j=0; j<mountains[i].length; j++) {
            mountains[i][j].x -= speed;
          }
          if(mountains[i][0].x < -150*scale) {
            mountains[i].shift();
            let lastX = mountains[i][mountains[i].length-1].x;
            mountains[i].push({ x: lastX + 120*scale, y: random(H*0.7, H*0.85) + i*35*scale });
          }
        }

        if (Math.random() < 0.03) {
          bgClouds.push({
            x: W + 100*scale,
            y: random(0, H * 0.6),
            size: random(50, 120) * scale,
            speed: random(0.2, 0.7),
            opacity: random(0.05, 0.2)
          });
        }

        for(let i=particles.length-1;i>=0;i--) { let p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.025; if(p.life<=0) particles.splice(i,1); }
        for(let i=floatingTexts.length-1;i>=0;i--) { floatingTexts[i].y-=1.5*scale; floatingTexts[i].life-=0.02; if(floatingTexts[i].life<=0) floatingTexts.splice(i,1); }
        for(let i=bgClouds.length-1;i>=0;i--) { bgClouds[i].x -= windSpeed*0.4 + bgClouds[i].speed; if(bgClouds[i].x<-250*scale) bgClouds.splice(i,1); }
        for(let i=stars.length-1;i>=0;i--) { stars[i].x -= stars[i].speed * 0.2; if(stars[i].x < -10) { stars[i].x = W + 10; stars[i].y = Math.random() * H * 0.6; } }
        
        windSpeed+=0.0006;
        distance+= (windSpeed * (boostActive ? 0.20 : 0.12));
        checkStage();
        if (screenShake > 0) screenShake *= 0.85;
        updateUI();
      }
      
      function drawSky() {
        let g=ctx.createLinearGradient(0,0,0,H);
        g.addColorStop(0,currentSky.top); g.addColorStop(1,currentSky.bottom);
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        
        if (currentStarAlpha > 0.01) {
          stars.forEach(s=>{
            let alpha = (0.5 + Math.sin(performance.now()*0.002 + s.twinkle) * 0.5) * currentStarAlpha;
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill();
          });
        }
      }

      function drawMountains() {
        for(let i=0; i<mountains.length; i++) {
          ctx.fillStyle = i === 0 ? currentSky.m1 : (i === 1 ? currentSky.m2 : '#290f02');
          ctx.beginPath();
          ctx.moveTo(mountains[i][0].x, H);
          for(let j=0; j<mountains[i].length; j++) {
            let next = mountains[i][j+1];
            if(next) {
              let cx = (mountains[i][j].x + next.x) / 2;
              let cy = (mountains[i][j].y + next.y) / 2;
              ctx.quadraticCurveTo(mountains[i][j].x, mountains[i][j].y, cx, cy);
            } else {
              ctx.lineTo(mountains[i][j].x, mountains[i][j].y);
            }
          }
          ctx.lineTo(W+200*scale, H);
          ctx.lineTo(0, H);
          ctx.fill();
        }
      }
      
      function drawBgClouds() {
        bgClouds.forEach(c=>{
          // Şafağa göre bulut rengi
          let color = stage >= 3 ? `rgba(255,255,255,${c.opacity})` : `rgba(253,186,116,${c.opacity*1.5})`;
          ctx.fillStyle= color;
          ctx.beginPath(); ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
          ctx.arc(c.x+c.size*0.6,c.y-c.size*0.3,c.size*0.8,0,Math.PI*2);
          ctx.arc(c.x-c.size*0.5,c.y+c.size*0.2,c.size*0.7,0,Math.PI*2);
          ctx.fill();
        });
      }
      
      function drawChimneys() {
        chimneys.forEach(c=>{
          let x=c.x, yBase=H-c.height, w=c.width;
          
          // Peri Bacası Gövdesi (Konik alt taraf)
          let grad=ctx.createLinearGradient(x-w*0.2, 0, x+w*1.2, 0);
          grad.addColorStop(0, `hsl(${c.hue}, 40%, 35%)`);
          grad.addColorStop(0.5, `hsl(${c.hue}, 50%, 55%)`);
          grad.addColorStop(1, `hsl(${c.hue}, 30%, 20%)`);
          
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.moveTo(x - w*0.3, H); 
          ctx.lineTo(x + w*0.1, yBase);
          ctx.lineTo(x + w*0.9, yBase);
          ctx.lineTo(x + w*1.3, H);
          ctx.fill();
          
          // Tüf/Kaya dokusu çizgileri
          ctx.strokeStyle = `rgba(0,0,0,0.15)`;
          ctx.lineWidth = 3*scale;
          for(let k=1; k<4; k++) {
            let ly = H - c.height*(k/4);
            ctx.beginPath();
            ctx.moveTo(x - w*0.1, ly);
            ctx.quadraticCurveTo(x + w*0.5, ly + 20*scale, x + w*1.1, ly);
            ctx.stroke();
          }
          
          // Peri Bacası Şapkası (Mantar Kısım)
          let capGrad = ctx.createRadialGradient(x+w*0.5, yBase-20*scale, 0, x+w*0.5, yBase, w);
          capGrad.addColorStop(0, `hsl(${c.hue-15}, 25%, 30%)`);
          capGrad.addColorStop(1, `hsl(${c.hue-25}, 35%, 15%)`);
          
          ctx.fillStyle = capGrad;
          ctx.beginPath();
          ctx.moveTo(x - w*0.25, yBase + 10*scale); // Sol alt
          ctx.lineTo(x + w*0.5, yBase - w*0.9); // Tepe noktası
          ctx.lineTo(x + w*1.25, yBase + 10*scale); // Sağ alt
          ctx.quadraticCurveTo(x + w*0.5, yBase + w*0.3, x - w*0.25, yBase + 10*scale); // Kavisli alt
          ctx.fill();
        });
      }
      
      function drawBirds() {
        birds.forEach(b=>{
          ctx.save(); ctx.translate(b.x,b.y);
          let wingY = Math.sin(performance.now()*0.02 + b.wingOffset) * b.size * 1.3;
          // Güvercin benzeri açık renkler
          ctx.fillStyle='#f8fafc';
          ctx.beginPath(); ctx.ellipse(0, 0, b.size, b.size*0.35, -0.1, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.moveTo(-b.size*0.8, 0); ctx.lineTo(-b.size*1.3, b.size*0.1); ctx.lineTo(-b.size*0.8, b.size*0.2); ctx.fill();
          ctx.fillStyle='#e2e8f0';
          ctx.beginPath(); ctx.moveTo(b.size*0.8, 0); ctx.lineTo(b.size*1.4, -b.size*0.2); ctx.lineTo(b.size*1.3, b.size*0.3); ctx.fill();
          ctx.fillStyle='#cbd5e1';
          ctx.beginPath(); ctx.moveTo(-b.size*0.3, -b.size*0.1); ctx.quadraticCurveTo(b.size*0.2, wingY - b.size, b.size*0.8, wingY); ctx.lineTo(b.size*0.2, wingY*0.5); ctx.fill();
          ctx.restore();
        });
      }
      
      function drawStormClouds() {
        stormClouds.forEach(s=>{
          let grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.radius);
          grad.addColorStop(0, '#334155');
          grad.addColorStop(1, '#0f172a');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(s.x+s.radius*0.5, s.y-s.radius*0.4, s.radius*0.7, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(s.x-s.radius*0.4, s.y-s.radius*0.2, s.radius*0.8, 0, Math.PI*2); ctx.fill();
          if(s.lightningPhase % 60 < 6) {
            ctx.strokeStyle='#fcd34d';
            ctx.lineWidth=3*scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            let lx = s.x; let ly = s.y;
            ctx.moveTo(lx, ly);
            for(let i=0; i<4; i++) {
              lx += random(-15, 15)*scale;
              ly += random(20, 35)*scale;
              ctx.lineTo(lx, ly);
            }
            ctx.stroke();
            ctx.fillStyle = 'rgba(252, 211, 77, 0.15)';
            ctx.beginPath(); ctx.arc(s.x, s.y, s.radius*1.4, 0, Math.PI*2); ctx.fill();
          }
        });
      }
      
      function drawRivalBalloons() {
        rivalBalloons.forEach(rb=>{
          ctx.save(); ctx.translate(rb.x, rb.y);
          let r = rb.size;
          
          // Sepet
          let basketW = r * 0.5;   
          let basketY = r * 1.3;
          ctx.strokeStyle='#78350f'; ctx.lineWidth=1*scale;
          ctx.beginPath(); 
          ctx.moveTo(-r*0.3, r*0.7); ctx.lineTo(-basketW*0.4, basketY);
          ctx.moveTo(r*0.3, r*0.7); ctx.lineTo(basketW*0.4, basketY);
          ctx.stroke();
          ctx.fillStyle = '#451a03';
          ctx.fillRect(-basketW/2, basketY, basketW, r*0.3);

          // Balon Gövdesi
          ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
          let sliceW = r*2.2/3;
          for(let i=0; i<3; i++){ 
            let hue = (rb.colorHue + i*40) % 360;
            ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;
            ctx.fillRect(-r*1.1+i*sliceW, -r*1.2, sliceW, r*2.4); 
          }
          let shadow=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1, 0,0,r);
          shadow.addColorStop(0,'rgba(255,255,255,0.3)'); 
          shadow.addColorStop(0.6,'rgba(0,0,0,0)');
          shadow.addColorStop(1,'rgba(0,0,0,0.6)'); 
          ctx.fillStyle=shadow; ctx.fillRect(-r*2,-r*2,r*4,r*4);
          ctx.restore();
        });
      }
      
      function drawBalloon() {
        ctx.save(); ctx.translate(balloon.x, balloon.y);
        ctx.rotate(balloon.vy*0.025); 
        let r=balloon.radius;
        
        if(magnetActive) {
          ctx.beginPath(); ctx.arc(0,0,r*2.2,0,Math.PI*2);
          ctx.fillStyle='rgba(168, 85, 247, 0.1)'; ctx.fill();
          ctx.strokeStyle='rgba(192, 132, 252, 0.7)'; ctx.lineWidth=2*scale; ctx.stroke();
        }
        if(boostActive) {
          ctx.beginPath(); ctx.arc(0,0,r*1.8,0,Math.PI*2);
          ctx.strokeStyle='rgba(250, 204, 21, 0.6)'; ctx.lineWidth=3*scale; ctx.setLineDash([10*scale, 8*scale]); ctx.stroke(); ctx.setLineDash([]);
        }
        
        let basketW = r * 0.6;   
        let basketH = r * 0.35;  
        let basketY = r * 1.25;
        
        // İpler
        ctx.strokeStyle='#78350f'; ctx.lineWidth=1.5*scale;
        ctx.beginPath(); 
        ctx.moveTo(-r*0.4, r*0.7); ctx.lineTo(-basketW*0.4, basketY);
        ctx.moveTo(r*0.4, r*0.7); ctx.lineTo(basketW*0.4, basketY);
        ctx.stroke();

        // Alev (Etourgood sıcak turuncu/sarı)
        if(pressing && fuel > 0) {
          let flameColor = boostActive ? '#fef08a' : '#facc15';
          ctx.fillStyle = flameColor;
          ctx.beginPath();
          ctx.moveTo(-r*0.15, basketY);
          ctx.lineTo(r*0.15, basketY);
          ctx.lineTo(0, r*0.4 + Math.random()*r*0.5); 
          ctx.fill();
          ctx.fillStyle = '#f97316';
          ctx.beginPath();
          ctx.moveTo(-r*0.08, basketY);
          ctx.lineTo(r*0.08, basketY);
          ctx.lineTo(0, r*0.6 + Math.random()*r*0.3);
          ctx.fill();
        }
        
        // Sepet (Hasır Rengi)
        let bGrad = ctx.createLinearGradient(-basketW/2, 0, basketW/2, 0);
        bGrad.addColorStop(0, '#9a3412'); 
        bGrad.addColorStop(1, '#451a03');
        ctx.fillStyle = bGrad;
        ctx.fillRect(-basketW/2, basketY, basketW, basketH);
        ctx.fillStyle='#f59e0b'; // Sepet detayı
        ctx.fillRect(-basketW/2 - 2*scale, basketY, basketW + 4*scale, basketH*0.25);
        
        // Balon Gövdesi (Etourgood Renkleri)
        ctx.save();
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
        let colors=['#ea580c','#facc15','#ffffff','#f43f5e']; // Turuncu, Sarı, Beyaz, Kırmızı
        let sw=r*2.2/4;
        for(let i=0;i<4;i++){ 
          let sliceGrad = ctx.createLinearGradient(-r*1.1+i*sw, -r, -r*1.1+(i+1)*sw, r);
          sliceGrad.addColorStop(0, colors[i]);
          sliceGrad.addColorStop(1, '#9a3412');
          ctx.fillStyle = sliceGrad; 
          ctx.fillRect(-r*1.1+i*sw, -r*1.2, sw, r*2.4); 
        }
        let shadow=ctx.createRadialGradient(-r*0.3,-r*0.3,r*0.1, 0,0,r);
        shadow.addColorStop(0,'rgba(255,255,255,0.4)'); 
        shadow.addColorStop(0.6,'rgba(0,0,0,0)');
        shadow.addColorStop(1,'rgba(0,0,0,0.6)'); 
        ctx.fillStyle=shadow; ctx.fillRect(-r*2,-r*2,r*4,r*4);
        ctx.restore();
        
        if(shieldActive) {
          ctx.beginPath(); ctx.arc(0,0,r*1.6,0,Math.PI*2);
          ctx.fillStyle='rgba(56, 189, 248, 0.15)'; ctx.fill();
          ctx.strokeStyle='#7dd3fc'; ctx.lineWidth=3*scale; ctx.stroke();
        }
        ctx.restore();
      }
      
      function drawCollectibles() {
        collectibles.forEach(c=>{
          let bob=Math.sin(performance.now()*0.01+c.bobPhase)*5*scale;
          ctx.save(); ctx.translate(c.x, c.y+bob);
          ctx.shadowBlur = 15;
          if(c.type==='fuel') {
            ctx.shadowColor = '#ea580c'; ctx.fillStyle='#c2410c'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#f97316'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('🔥',0,4*scale);
          } else if(c.type==='shield') {
            ctx.shadowColor = '#0284c7'; ctx.fillStyle='#0369a1'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#38bdf8'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('🛡️',0,4*scale);
          } else if(c.type==='magnet') {
            ctx.shadowColor = '#9333ea'; ctx.fillStyle='#7e22ce'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#a855f7'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('🧲',0,4*scale);
          } else if(c.type==='boost') {
            ctx.shadowColor = '#ca8a04'; ctx.fillStyle='#a16207'; ctx.beginPath(); ctx.arc(0,2*scale,c.radius,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#facc15'; ctx.beginPath(); ctx.arc(0,-1*scale,c.radius*0.85,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.font=`bold ${c.radius*1.1}px Inter`; ctx.textAlign='center'; ctx.fillText('⚡',0,4*scale);
          }
          ctx.restore();
        });
      }
      
      function drawParticles() {
        ctx.globalCompositeOperation = 'lighter'; 
        particles.forEach(p=>{
          ctx.globalAlpha=Math.max(0, p.life);
          ctx.fillStyle=p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha=1;
        ctx.globalCompositeOperation = 'source-over';
      }
      
      function drawFloatingTexts() {
        floatingTexts.forEach(t=>{
          ctx.globalAlpha=Math.max(0, t.life);
          ctx.fillStyle=t.color;
          ctx.font=`800 ${18*scale}px Inter`;
          ctx.textAlign='center';
          ctx.shadowBlur = 6; ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.fillText(t.text, t.x, t.y);
          ctx.shadowBlur = 0;
        });
        ctx.globalAlpha=1;
      }
      
      function render() {
        ctx.save();
        if (screenShake > 0.5) {
          let shakeX = (Math.random() - 0.5) * screenShake;
          let shakeY = (Math.random() - 0.5) * screenShake;
          ctx.translate(shakeX, shakeY);
        }
        drawSky();
        drawMountains();
        drawBgClouds();
        drawChimneys();
        drawStormClouds();
        drawRivalBalloons();
        drawCollectibles();
        drawBirds(); 
        if(gameState !== STATE.MENU && gameState !== STATE.CRASHING) drawBalloon();
        drawParticles();
        drawFloatingTexts();
        ctx.restore();
      }
      
      function gameLoop() {
        if (gameState === STATE.PLAYING || gameState === STATE.CRASHING) {
          if(gameState === STATE.PLAYING) spawnObjects();
          updateGame();
        } else {
          updateGame();
        }
        render();
        requestAnimationFrame(gameLoop);
      }
      
      function startGame() {
        initAudio();
        sfxClick();
        fullReset();
        gameState = STATE.PLAYING;
        menuScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        hudContainer.style.opacity = '1';
        updateUI();
      }
      
      function endGame() {
        if (gameState === STATE.CRASHING || gameState === STATE.OVER) return;
        gameState = STATE.CRASHING; 
        hudContainer.style.opacity = '0';
        
        let isNewHigh = false;
        if (distance > highScore) {
          highScore = Math.floor(distance);
          try { localStorage.setItem('etourgood_sky_high', highScore); } catch(e) {}
          isNewHigh = true;
          updateHighScoreUI();
        }

        setTimeout(() => {
          gameState = STATE.OVER;
          finalDistText.textContent = Math.floor(distance) + ' m';
          if (isNewHigh) {
            newHighScoreBadge.style.display = 'block';
          } else {
            newHighScoreBadge.style.display = 'none';
          }
          gameOverScreen.style.display = 'flex';
          gsap.fromTo(gameOverScreen.querySelector('.glass-panel'), 
            { scale: 0.8, opacity: 0, y: 50 }, 
            { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }
          );
        }, 800); 
      }
      
      function restartGame() {
        sfxClick();
        gameOverScreen.style.display = 'none';
        startGame();
      }

      function goToMenu() {
        sfxClick();
        gameState = STATE.MENU;
        gameOverScreen.style.display = 'none';
        hudContainer.style.opacity = '0';
        menuScreen.style.display = 'flex';
        updateHighScoreUI();
        fullReset();
      }
      
      canvas.addEventListener('touchstart', (e) => { 
        if(e.target.tagName !== 'BUTTON') e.preventDefault(); 
        if(gameState===STATE.PLAYING) { pressing = true; initAudio(); }
      }, {passive: false});
      canvas.addEventListener('touchend', (e) => { 
        if(e.target.tagName !== 'BUTTON') e.preventDefault(); 
        pressing = false; 
      }, {passive: false});
      canvas.addEventListener('mousedown', (e) => { 
        if(gameState===STATE.PLAYING && e.target.tagName !== 'BUTTON') { pressing = true; initAudio(); }
      });
      canvas.addEventListener('mouseup', () => pressing = false);
      
      document.getElementById('startBtn').addEventListener('click', startGame);
      document.getElementById('retryBtn').addEventListener('click', restartGame);
      document.getElementById('menuBtn').addEventListener('click', goToMenu);
      
      fullReset();
      gameLoop();
    })();
  </script>
</body>
</html>
