<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Tower Cube Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }
    #score {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 20px;
      background: rgba(0,0,0,0.4);
      padding: 10px 15px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }
    #instructions {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="score">Skor: 0</div>
  <div id="instructions">Küplere dokun / tıkla → düşsün</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let cubes = [];
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let score = 0;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
      camera.position.set(5, 8, 12);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(5, 10, 7);
      scene.add(light);

      const ambient = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambient);

      createTower();

      window.addEventListener('pointerdown', onClick);
      window.addEventListener('resize', onResize);
    }

    function createTower() {
      const size = 1;
      for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 4; x++) {
          for (let z = 0; z < 4; z++) {
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({
              color: new THREE.Color(Math.random(), Math.random(), Math.random())
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x - 1.5, y, z - 1.5);
            cube.userData = { falling: false, velocity: 0 };
            scene.add(cube);
            cubes.push(cube);
          }
        }
      }
    }

    function onClick(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(cubes);

      if (intersects.length > 0) {
        const cube = intersects[0].object;
        if (!cube.userData.falling) {
          cube.userData.falling = true;
          cube.userData.velocity = 0.05;
          score++;
          document.getElementById('score').innerText = "Skor: " + score;
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      cubes.forEach(cube => {
        if (cube.userData.falling) {
          cube.userData.velocity += 0.01;
          cube.position.y -= cube.userData.velocity;
        }
      });

      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
